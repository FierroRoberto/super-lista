<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#138A68">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Súper">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<title>Lista del Súper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F4F2EE;--surface:#FFF;--surface2:#F9F8F5;
  --border:#E4E0D8;--border2:#CCC8BF;
  --text:#1C1B18;--text2:#706D64;--text3:#A09D96;
  --t:#0C5C47;--tm:#138A68;--tl:#D8F0E8;--tx:#EEF9F4;
  --a:#7A4508;--am:#B86B12;--al:#FDECD3;--ax:#FEF6EA;
  --c:#8C3219;--cm:#C94E2A;--cl:#FAE4DB;--cx:#FDF2EE;
  --p:#4840A8;--pm:#7068CC;--pl:#E8E6FC;--px:#F3F2FE;
  --rad:14px;--rads:9px;--radx:6px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);
}
body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100dvh;max-width:430px;margin:0 auto;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}

/* ── Header (no scrollea, parte del flex) ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px 10px;flex-shrink:0;box-shadow:var(--sh);z-index:10}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.brand{display:flex;align-items:center;gap:8px}
.brand-ico{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--tm),var(--t));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(19,138,104,.35)}
.brand h1{font-size:15px;font-weight:800;letter-spacing:-.3px}
.brand p{font-size:11px;color:var(--text2);font-weight:500;margin-top:1px}
.hdr-btns{display:flex;gap:6px}
.ico-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:background .15s}
.ico-btn:active{background:var(--bg)}
.ico-btn.on{background:var(--tx);border-color:var(--tm)}
.sync-bar{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radx);font-size:11.5px;cursor:pointer}
.sync-bar:active{background:var(--border)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .3s}
.dot.ok{background:#22C78B}.dot.spin{background:var(--am);animation:blink 1s infinite}.dot.err{background:var(--cm)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{flex:1;color:var(--text2);font-weight:500}
.sync-btn{font-size:11px;font-weight:800;color:var(--tm);background:none;border:none;cursor:pointer;padding:2px 4px}

/* ── TOTAL SIEMPRE VISIBLE — en el flujo flex, nunca scrollea ── */
.total-fixed{padding:6px 12px;background:var(--bg);flex-shrink:0;z-index:9}
.total-banner{background:var(--text);color:#fff;border-radius:var(--rad);padding:10px 15px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shm)}
.total-banner .lbl{font-size:10px;font-weight:700;opacity:.55;text-transform:uppercase;letter-spacing:.5px}
.total-banner .amt{font-size:22px;font-weight:800;letter-spacing:-1px;margin-top:1px}
.total-banner .right{text-align:right}
.total-banner .pct{font-size:15px;font-weight:800}

/* ── Edit banner ── */
.edit-ban{background:var(--tx);border-bottom:1px solid var(--tl);padding:7px 14px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--t);flex-shrink:0}
.edit-ban span{flex:1}

/* ── Tabs: en el flujo flex, no scrollea ── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}

/* ── Content: el ÚNICO elemento que scrollea ── */
.content{flex:1;overflow-y:auto;padding:10px 12px 100px;-webkit-overflow-scrolling:touch}

/* ── Edit banner ── */
.edit-ban{background:var(--tx);border-bottom:1px solid var(--tl);padding:7px 14px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--t);position:sticky;z-index:88}
.edit-ban span{flex:1}

/* ── Tab styles ── */
.tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid transparent;cursor:pointer;background:transparent;white-space:nowrap;transition:all .15s}
.tab.all{color:var(--text2);border-color:var(--border)}.tab.all.on{background:var(--text);color:#fff;border-color:var(--text)}
.tab.t0{color:var(--t);border-color:var(--tl)}.tab.t0.on{background:var(--t);color:#fff;border-color:var(--t)}
.tab.t1{color:var(--a);border-color:var(--al)}.tab.t1.on{background:var(--am);color:#fff;border-color:var(--am)}
.tab.t2{color:var(--c);border-color:var(--cl)}.tab.t2.on{background:var(--cm);color:#fff;border-color:var(--cm)}
.tab.t3{color:var(--p);border-color:var(--pl)}.tab.t3.on{background:var(--pm);color:#fff;border-color:var(--pm)}

/* ── Store card ── */
.card{background:var(--surface);border-radius:var(--rad);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh);animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card-head{padding:11px 13px 9px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border)}
.ch0{background:var(--tx)}.ch1{background:var(--ax)}.ch2{background:var(--cx)}.ch3{background:var(--px)}
.card-title{font-size:14px;font-weight:800;letter-spacing:-.3px}
.card-sub{font-size:11.5px;font-weight:500;margin-top:3px}
.cs0{color:var(--tm)}.cs1{color:var(--am)}.cs2{color:var(--cm)}.cs3{color:var(--pm)}
.reset-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;background:var(--surface);white-space:nowrap;transition:all .15s}
.rb0{color:var(--t);border-color:var(--tm)}.rb0:active{background:var(--t);color:#fff}
.rb1{color:var(--a);border-color:var(--am)}.rb1:active{background:var(--am);color:#fff}
.rb2{color:var(--c);border-color:var(--cm)}.rb2:active{background:var(--cm);color:#fff}
.rb3{color:var(--p);border-color:var(--pm)}.rb3:active{background:var(--pm);color:#fff}
.prog-wrap{padding:7px 13px 9px;display:flex;align-items:center;gap:8px}
.prog{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.pf0{background:var(--tm)}.pf1{background:var(--am)}.pf2{background:var(--cm)}.pf3{background:var(--pm)}
.prog-pct{font-size:11px;font-weight:700;color:var(--text3);min-width:26px;text-align:right}

/* ── Item row normal ── */
.item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:background .1s}
.item:last-child{border-bottom:none}
.item:active{background:var(--bg)}
.item.done{opacity:.42}
.cb{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cb.on0{background:var(--tm);border-color:var(--tm)}.cb.on1{background:var(--am);border-color:var(--am)}
.cb.on2{background:var(--cm);border-color:var(--cm)}.cb.on3{background:var(--pm);border-color:var(--pm)}
.cb svg{display:none}.cb.on0 svg,.cb.on1 svg,.cb.on2 svg,.cb.on3 svg{display:block}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item.done .item-name{text-decoration:line-through}
.item-qty{font-size:11px;color:var(--text2);margin-top:1px;font-weight:500}
.item-price{font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0}

/* ── Item row EDIT (con mover + eliminar) ── */
.item-edit{display:flex;align-items:center;gap:6px;padding:6px 10px 6px 13px;border-bottom:1px solid var(--border);background:var(--surface)}
.item-edit:last-child{border-bottom:none}
.item-edit-name{font-size:12px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.edit-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;text-align:center;margin-bottom:2px}
.stepper{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:7px;overflow:hidden;flex-shrink:0}
.stbtn{width:26px;height:26px;border:none;background:var(--surface2);font-size:15px;font-weight:700;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .1s}
.stbtn:active{background:var(--border)}
.stval{min-width:24px;text-align:center;font-size:12px;font-weight:800;border-left:1px solid var(--border);border-right:1px solid var(--border);height:26px;line-height:26px}
.price-inp-wrap{display:flex;align-items:center;gap:2px;border:1.5px solid var(--border);border-radius:7px;padding:0 6px;height:26px;flex-shrink:0;background:var(--surface2)}
.price-inp-wrap:focus-within{border-color:var(--tm);background:var(--surface)}
.price-inp-wrap span{font-size:11px;color:var(--text3);font-weight:700}
.price-inp{width:40px;border:none;background:transparent;font-size:12px;font-weight:800;color:var(--text);font-family:inherit;outline:none;text-align:right}
/* Botones de mover y eliminar */
.move-btns{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.move-btn{width:22px;height:20px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .1s}
.move-btn:active{background:var(--border)}
.move-btn:disabled{opacity:.25;cursor:default}
.del-btn{width:26px;height:26px;border:none;border-radius:6px;background:var(--cx);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s}
.del-btn:active{background:var(--cm);color:#fff}

/* ── Subtotal ── */
.subtotal{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:var(--surface2);border-top:1px solid var(--border)}
.sub-lbl{font-size:11.5px;color:var(--text2);font-weight:600}
.sub-val{font-size:14px;font-weight:800}
.sv0{color:var(--t)}.sv1{color:var(--a)}.sv2{color:var(--c)}.sv3{color:var(--p)}

/* ── FAB ── */
.fab{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--tm);color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 16px rgba(19,138,104,.45);z-index:150;white-space:nowrap;transition:transform .15s}
.fab:active{transform:translateX(-50%) scale(.95)}

/* ── Overlays ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);border-radius:var(--rad) var(--rad) 0 0;padding:20px 18px 32px;width:100%;max-width:430px;animation:slideUp .22s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(60px)}to{transform:none}}
.sheet-title{font-size:15px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
.sheet-sub{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:16px;line-height:1.5}

/* ── Panel Drive ── */
.cfg-section{font-size:10.5px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.cfg-section:first-of-type{margin-top:0}
.field{margin-bottom:9px}
.field-lbl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.field input{width:100%;font-size:13px;font-family:inherit;font-weight:600;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--rads);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--tm);background:var(--surface)}
.field input::placeholder{color:var(--text3);font-weight:500}
.field-hint{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500;line-height:1.4}
.btn-primary{width:100%;padding:11px;background:var(--tm);color:#fff;border:none;border-radius:var(--rads);font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;transition:opacity .15s;margin-bottom:7px}
.btn-primary:active{opacity:.85}
.btn-secondary{width:100%;padding:10px;background:none;border:1.5px solid var(--border);border-radius:var(--rads);font-size:13px;font-weight:700;color:var(--text2);font-family:inherit;cursor:pointer;margin-bottom:7px}
.btn-secondary:active{background:var(--bg)}
.status-row{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border-radius:var(--radx);margin-bottom:10px;font-size:12.5px}
.status-row.ok{background:var(--tx)}.status-row.warn{background:var(--ax)}.status-row.fail{background:var(--cx)}
.status-row b{display:block;font-weight:800;margin-bottom:2px}
.status-row span{color:var(--text2);font-size:11.5px;line-height:1.4}

/* ── Add sheet ── */
.store-opt{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--rads);border:1.5px solid var(--border);cursor:pointer;margin-bottom:8px;transition:all .15s}
.store-opt:active{opacity:.8}
.so0:active,.so0.sel{background:var(--tx);border-color:var(--tm)}
.so1:active,.so1.sel{background:var(--ax);border-color:var(--am)}
.so2:active,.so2.sel{background:var(--cx);border-color:var(--cm)}
.so3:active,.so3.sel{background:var(--px);border-color:var(--pm)}
.so-emoji{font-size:20px}
.so-info{flex:1}.so-name{font-size:13.5px;font-weight:800}.so-count{font-size:11px;color:var(--text2);margin-top:1px;font-weight:500}
.store-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:12px}
.sb0{background:var(--tx);color:var(--t)}.sb1{background:var(--ax);color:var(--a)}
.sb2{background:var(--cx);color:var(--c)}.sb3{background:var(--px);color:var(--p)}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--text2);font-family:inherit;margin-bottom:12px;padding:0}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}

/* ── Toast ── */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:50px;padding:9px 18px;font-size:12.5px;font-weight:700;z-index:400;white-space:nowrap;pointer-events:none;animation:tIn .22s ease,tOut .3s ease 1.8s forwards}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tOut{to{opacity:0}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <div class="brand">
      <div class="brand-ico">🛒</div>
      <div><h1>Lista del Súper</h1><p id="gstats">Cargando…</p></div>
    </div>
    <div class="hdr-btns">
      <button class="ico-btn" id="edit-btn" onclick="toggleEdit()" title="Editar">✏️</button>
      <button class="ico-btn" id="cfg-btn"  onclick="openCfg()"   title="Drive">⚙️</button>
    </div>
  </div>
  <div class="sync-bar" onclick="syncTap()">
    <div class="dot" id="dot"></div>
    <span class="sync-lbl" id="slbl">Verificando…</span>
    <button class="sync-btn" onclick="event.stopPropagation();doSync()">↻ Sync</button>
  </div>
</header>

<div id="edit-banner" class="edit-ban" style="display:none">
  <span>✏️ Modo edición — mueve, edita o elimina artículos</span>
  <button onclick="toggleEdit()" style="background:none;border:none;font-size:12px;font-weight:800;color:var(--t);cursor:pointer">Listo ✓</button>
</div>

<!-- TOTAL SIEMPRE VISIBLE (position:fixed — nunca scrollea) -->
<div class="total-fixed" id="total-fixed">
  <div class="total-banner">
    <div>
      <div class="lbl">Total en carrito</div>
      <div class="amt" id="gtotal">$0</div>
    </div>
    <div class="right">
      <div class="lbl">Completado</div>
      <div class="pct" id="gpct">0%</div>
    </div>
  </div>
</div>

<nav class="tabs">
  <button class="tab all on" onclick="setTab(-1)">Todas</button>
  <button class="tab t0"     onclick="setTab(0)">🏪 Walmart</button>
  <button class="tab t1"     onclick="setTab(1)">🏪 SAM'S</button>
  <button class="tab t2"     onclick="setTab(2)">🏪 HEB</button>
  <button class="tab t3"     onclick="setTab(3)">🥦 Frutas</button>
</nav>

<main class="content" id="content"></main>
<button class="fab" onclick="openAdd()">＋ Agregar artículo</button>

<div class="overlay" id="cfg-overlay" style="display:none" onclick="if(event.target===this)closeCfg()">
  <div class="sheet" id="cfg-sheet"></div>
</div>
<div class="overlay" id="add-overlay" style="display:none" onclick="if(event.target===this)closeAdd()">
  <div class="sheet" id="add-sheet"></div>
</div>
<div id="toasts"></div>

<script>

/* ══════════════════════════════════════════════
   ESTADO
══════════════════════════════════════════════ */
const LS_KEY = 'superLista_v5';
let S = {
  checks:{}, overrides:{},
  // extras[sid] = array de {n,q,p} — artículos personalizados en ORDEN
  extras:{},
  fileId:'', clientId:'',
  token:'', tokenAt:0, lastVer:0
};
let STORES=[], tab=-1, editMode=false;
let syncSt='off', pollTmr=null, writeTmr=null;

function loadS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) S = {...S, ...JSON.parse(raw)};
    else {
      // migración versiones anteriores
      for (const k of ['superLista_v4','superLista_v3','superLista_v2']) {
        const old = localStorage.getItem(k);
        if (!old) continue;
        try {
          const o = JSON.parse(old);
          if (o.checks)       S.checks    = o.checks;
          if (o.overrides)    S.overrides = o.overrides;
          if (o.driveFileId)  S.fileId    = o.driveFileId;
          if (o.oauthClientId)S.clientId  = o.oauthClientId;
          if (o.extras||o.customItems) S.extras = o.extras||o.customItems;
        } catch(e){}
        break;
      }
    }
  } catch(e){}
  buildStores();
}
function saveS() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch(e){}
}

/* ══════════════════════════════════════════════
   BUILD STORES
   extras[sid] guarda los ítems extra con su orden actual.
   overrides[sid_i] guarda ediciones de q/p para ítems base.
   Para ítems extra, las ediciones se guardan directo en el array.
══════════════════════════════════════════════ */
function buildStores() {
  STORES = BASE.map(b => {
    const extraItems = S.extras[b.id] || [];
    const allItems   = [...b.items, ...extraItems];
    return {
      ...b,
      items: allItems.map((item, i) => {
        // Solo aplicar overrides a ítems base (índice < b.items.length)
        if (i < b.items.length) {
          const ov = S.overrides[b.id+'_'+i] || {};
          return { n:item.n, q:ov.q??item.q, p:ov.p??item.p, base:true };
        }
        // Ítems extra — sus propiedades ya están actualizadas en S.extras
        return { ...item, base:false };
      })
    };
  });
}

/* ══════════════════════════════════════════════
   CHECKS
══════════════════════════════════════════════ */
function ck(sid,i){ return !!S.checks[sid+'_'+i]; }

function toggle(sid,i){
  if(editMode) return;
  S.checks[sid+'_'+i] = !S.checks[sid+'_'+i];
  saveS(); render(); schedWrite();
}

function resetStore(sid){
  Object.keys(S.checks).forEach(k=>{ if(k.startsWith(sid+'_')) delete S.checks[k]; });
  saveS(); render(); schedWrite();
}

/* ══════════════════════════════════════════════
   EDICIÓN — cantidad y precio
══════════════════════════════════════════════ */
function setQty(sid,i,delta){
  const store = STORES.find(s=>s.id===sid);
  const cur   = store.items[i].q;
  const next  = Math.max(1, cur+delta);
  if (next===cur) return;
  const baseLen = BASE.find(b=>b.id===sid).items.length;
  if (i < baseLen) {
    // ítem base → usar overrides
    const key = sid+'_'+i;
    if (!S.overrides[key]) S.overrides[key]={};
    S.overrides[key].q = next;
  } else {
    // ítem extra → editar directo en extras
    const ei = i - baseLen;
    if (!S.extras[sid]) S.extras[sid]=[];
    S.extras[sid][ei].q = next;
  }
  buildStores(); saveS(); schedWrite();
  const el = document.getElementById('qv_'+sid+'_'+i);
  if(el) el.textContent = next;
  updateTotals();
}

function setPrice(sid,i,val){
  const v = parseInt(val,10);
  if(isNaN(v)||v<0) return;
  const baseLen = BASE.find(b=>b.id===sid).items.length;
  if (i < baseLen) {
    const key = sid+'_'+i;
    if(!S.overrides[key]) S.overrides[key]={};
    S.overrides[key].p = v;
  } else {
    const ei = i - baseLen;
    if(!S.extras[sid]) S.extras[sid]=[];
    S.extras[sid][ei].p = v;
  }
  buildStores(); saveS(); schedWrite();
  updateTotals();
}

/* ══════════════════════════════════════════════
   MOVER ARTÍCULO (arriba / abajo)
   Solo funciona en ítems extra (los de BASE no se mueven).
   Para ítems base, se mueven creando una copia en extras
   y marcando el original como "oculto".
══════════════════════════════════════════════ */
function moveItem(sid, i, dir) {
  const store   = STORES.find(s=>s.id===sid);
  const total   = store.items.length;
  const newIdx  = i + dir;
  if (newIdx < 0 || newIdx >= total) return;

  // Construir lista completa de ítems del store como objetos editables
  // (combina BASE con overrides + extras en el orden actual)
  const fullList = store.items.map((item, idx) => ({
    n: item.n, q: item.q, p: item.p,
    checked: !!S.checks[sid+'_'+idx]
  }));

  // Swap
  [fullList[i], fullList[newIdx]] = [fullList[newIdx], fullList[i]];

  // Guardar toda la lista reordenada como extras (reemplaza base + extras)
  // y limpiar overrides/checks del store
  S.extras[sid] = fullList.map(item => {
    const obj = { n:item.n, q:item.q };
    if (item.p !== undefined) obj.p = item.p;
    return obj;
  });

  // Reconstruir checks con nuevos índices
  const newChecks = {};
  Object.keys(S.checks).forEach(k => {
    if (!k.startsWith(sid+'_')) newChecks[k] = S.checks[k];
  });
  fullList.forEach((item, idx) => {
    if (item.checked) newChecks[sid+'_'+idx] = true;
  });
  S.checks = newChecks;

  // Limpiar overrides del store (ya están integrados en extras)
  Object.keys(S.overrides).forEach(k => {
    if (k.startsWith(sid+'_')) delete S.overrides[k];
  });

  // Vaciar items base del store para que buildStores use solo extras
  // Hacemos esto marcando en BASE que este store ya tiene orden personalizado
  if (!S.customOrder) S.customOrder = {};
  S.customOrder[sid] = true;

  buildStores(); saveS(); schedWrite(); render();
}

/* ══════════════════════════════════════════════
   ELIMINAR ARTÍCULO
══════════════════════════════════════════════ */
function deleteItem(sid, i) {
  const store   = STORES.find(s=>s.id===sid);
  const total   = store.items.length;

  // Construir lista sin el ítem eliminado
  const fullList = store.items
    .map((item, idx) => ({
      n:item.n, q:item.q, p:item.p,
      checked: !!S.checks[sid+'_'+idx]
    }))
    .filter((_,idx) => idx !== i);

  // Guardar como extras con orden personalizado
  S.extras[sid] = fullList.map(item => {
    const obj = { n:item.n, q:item.q };
    if (item.p !== undefined) obj.p = item.p;
    return obj;
  });

  // Reconstruir checks
  const newChecks = {};
  Object.keys(S.checks).forEach(k => {
    if (!k.startsWith(sid+'_')) newChecks[k] = S.checks[k];
  });
  fullList.forEach((item, idx) => {
    if (item.checked) newChecks[sid+'_'+idx] = true;
  });
  S.checks = newChecks;

  // Limpiar overrides del store
  Object.keys(S.overrides).forEach(k => {
    if (k.startsWith(sid+'_')) delete S.overrides[k];
  });

  if (!S.customOrder) S.customOrder = {};
  S.customOrder[sid] = true;

  buildStores(); saveS(); schedWrite(); render();
  toast('🗑️ Artículo eliminado');
}

/* buildStores actualizado para respetar orden personalizado */
function buildStores() {
  STORES = BASE.map(b => {
    const hasCustom = S.customOrder && S.customOrder[b.id];
    let allItems;
    if (hasCustom) {
      // Orden personalizado: usar solo extras (ya contiene todo el store reordenado)
      allItems = S.extras[b.id] || [];
    } else {
      // Orden base + extras al final
      const extraItems = S.extras[b.id] || [];
      allItems = [...b.items, ...extraItems];
    }
    return {
      ...b,
      items: allItems.map((item, i) => {
        if (!hasCustom && i < b.items.length) {
          const ov = S.overrides[b.id+'_'+i] || {};
          return { n:item.n, q:ov.q??item.q, p:ov.p??item.p };
        }
        return { n:item.n, q:item.q, p:item.p };
      })
    };
  });
}

/* ══════════════════════════════════════════════
   STATS + TOTALS
══════════════════════════════════════════════ */
function storeStats(si){
  const s=STORES[si], n=s.items.length;
  const done=s.items.filter((_,i)=>ck(s.id,i)).length;
  return {n,done,pct:n?Math.round(done/n*100):0};
}
function subtotal(si){
  const s=STORES[si];
  if(!s.prices) return null;
  return s.items.reduce((sum,item,i)=>ck(s.id,i)?sum+item.q*(item.p||0):sum,0);
}
function grandTotal(){ return STORES.reduce((sum,_,i)=>{const sub=subtotal(i);return sub!=null?sum+sub:sum;},0); }
function globalDone() { return STORES.reduce((s,_,i)=>s+storeStats(i).done,0); }
function globalTotal(){ return STORES.reduce((s,b)=>s+b.items.length,0); }

function updateTotals(){
  const done=globalDone(), total=globalTotal(), gt=grandTotal();
  // Total sticky
  const ge=document.getElementById('gtotal'); if(ge) ge.textContent='$'+gt.toLocaleString('es-MX');
  const gp=document.getElementById('gpct');   if(gp) gp.textContent=(total?Math.round(done/total*100):0)+'%';
  const gs=document.getElementById('gstats'); if(gs) gs.textContent=`${done}/${total} artículos`;
  // Subtotales por tienda
  STORES.forEach((s,i)=>{
    const sub=subtotal(i);
    const el=document.getElementById('sub_'+s.id); if(el&&sub!==null) el.textContent='$'+sub.toLocaleString('es-MX');
    const st=storeStats(i);
    const el2=document.getElementById('csub_'+s.id);
    if(el2) el2.textContent=`${st.done}/${st.n} marcados${sub!=null?' · $'+sub.toLocaleString('es-MX'):''}`;
  });
}

function setTab(t){

const CHK=`<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function renderItemNormal(s,item,i){
  const on=ck(s.id,i);
  const total=s.prices?item.q*(item.p||0):null;
  return `<div class="item${on?' done':''}" onclick="toggle('${s.id}',${i})">
    <div class="cb${on?' on'+s.c:''}">${on?CHK:''}</div>
    <div class="item-info">
      <div class="item-name">${item.n}</div>
      <div class="item-qty">${item.q} ${item.q>1?'pzas':'pza'}${item.p?' · $'+item.p+' c/u':''}</div>
    </div>
    ${total!==null?`<div class="item-price">$${total}</div>`:''}
  </div>`;
}

function renderItemEdit(s,item,i,totalItems){
  const isFirst=i===0, isLast=i===totalItems-1;
  return `<div class="item-edit">
    <!-- Botones mover -->
    <div class="move-btns">
      <button class="move-btn" onclick="moveItem('${s.id}',${i},-1)" ${isFirst?'disabled':''} title="Subir">▲</button>
      <button class="move-btn" onclick="moveItem('${s.id}',${i},+1)" ${isLast?'disabled':''} title="Bajar">▼</button>
    </div>
    <div class="item-edit-name">${item.n}</div>
    <!-- Piezas -->
    <div>
      <div class="edit-lbl">Pzas</div>
      <div class="stepper">
        <button class="stbtn" onclick="setQty('${s.id}',${i},-1)">−</button>
        <div class="stval" id="qv_${s.id}_${i}">${item.q}</div>
        <button class="stbtn" onclick="setQty('${s.id}',${i},+1)">+</button>
      </div>
    </div>
    <!-- Precio -->
    ${s.prices?`<div>
      <div class="edit-lbl">Precio</div>
      <div class="price-inp-wrap"><span>$</span>
        <input class="price-inp" type="number" inputmode="numeric" min="0"
          value="${item.p||0}" oninput="setPrice('${s.id}',${i},this.value)">
      </div>
    </div>`:''}
    <!-- Eliminar -->
    <button class="del-btn" onclick="deleteItem('${s.id}',${i})" title="Eliminar">🗑</button>
  </div>`;
}

function renderCard(si){
  const s=STORES[si], st=storeStats(si), sub=subtotal(si), c=s.c;
  return `<div class="card">
    <div class="card-head ch${c}">
      <div style="flex:1;min-width:0">
        <div class="card-title">${s.emoji} ${s.name}</div>
        <div class="card-sub cs${c}" id="csub_${s.id}">${st.done}/${st.n} marcados${sub!=null?' · $'+sub.toLocaleString('es-MX'):''}</div>
      </div>
      ${!editMode?`<button class="reset-btn rb${c}" onclick="resetStore('${s.id}')">↺ Reset</button>`:''}
    </div>
    <div class="prog-wrap">
      <div class="prog"><div class="prog-fill pf${c}" style="width:${st.pct}%"></div></div>
      <div class="prog-pct">${st.pct}%</div>
    </div>
    <div>${s.items.map((item,i)=>editMode?renderItemEdit(s,item,i,s.items.length):renderItemNormal(s,item,i)).join('')}</div>

      <span class="sub-lbl">Subtotal marcado</span>

function render(){

  if(tab===-1) html=STORES.map((_,i)=>renderCard(i)).join('');
  else         html=renderCard(tab);
  document.getElementById('content').innerHTML=html;
  updateTotals();
  updateSyncUI();
}

/* ══════════════════════════════════════════════
   GOOGLE IDENTITY SERVICES
══════════════════════════════════════════════ */
let tokenClient=null;

function initGIS(){
  if(!S.clientId||!window.google?.accounts) return;
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:S.clientId,
    scope:'https://www.googleapis.com/auth/drive.file',
    callback:(resp)=>{
      if(resp.error){ toast('❌ Error: '+resp.error); syncSt='err'; updateSyncUI(); return; }
      S.token=resp.access_token; S.tokenAt=Date.now();
      saveS(); syncSt='ok'; updateSyncUI();
      closeCfg(); toast('✅ Conectado con Google Drive');
      startPoll(); doSync();
    }
  });
}

function requestToken(){
  if(!tokenClient) initGIS();
  if(!tokenClient){ toast('⚠️ Pon tu Client ID primero'); openCfg(); return; }
  tokenClient.requestAccessToken({prompt:'select_account'});
}

function tokenExpired(){ return !S.token||!S.tokenAt||(Date.now()-S.tokenAt)>55*60*1000; }

async function ensureToken(){
  if(!tokenExpired()) return true;
  if(!S.clientId) return false;
  return new Promise(resolve=>{
    if(!tokenClient) initGIS();
    if(!tokenClient){ resolve(false); return; }
    const orig=tokenClient.callback;
    tokenClient.callback=(resp)=>{
      tokenClient.callback=orig;
      if(resp.error){
        syncSt='err';
        const l=document.getElementById('slbl');
        if(l) l.textContent='⚠️ Sesión expirada — toca ⚙️';
        updateSyncUI(); resolve(false); return;
      }
      S.token=resp.access_token; S.tokenAt=Date.now();
      saveS(); resolve(true);
    };
    tokenClient.requestAccessToken({prompt:''});
  });
}

/* ══════════════════════════════════════════════
   DRIVE SYNC
══════════════════════════════════════════════ */
let lastError = '';   // guarda el último error para diagnóstico

function schedWrite(){
  if(!S.token||!S.fileId) return;
  clearTimeout(writeTmr);
  writeTmr=setTimeout(writeToD,1500);
}

async function writeToD(){
  if(!S.fileId) return;
  const ok=await ensureToken();
  if(!ok){ syncSt='err'; updateSyncUI(); return; }
  syncSt='busy'; updateSyncUI();
  const body=JSON.stringify({
    checks:S.checks, overrides:S.overrides,
    extras:S.extras, customOrder:S.customOrder||{},
    version:Date.now()
  });
  try {
    const r=await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${S.fileId}?uploadType=media`,
      {method:'PATCH',headers:{'Authorization':'Bearer '+S.token,'Content-Type':'application/json'},body}
    );
    if(r.ok){
      S.lastVer=Date.now(); syncSt='ok'; lastError=''; saveS();
    } else {
      syncSt='err';
      let errBody='';
      try{ const j=await r.json(); errBody=j?.error?.message||JSON.stringify(j); }catch(e){}
      lastError=`WRITE ${r.status}: ${errBody}`;
    }
  } catch(e){
    syncSt='err';
    lastError='WRITE network error: '+e.message;
  }
  updateSyncUI();
}

async function readFromD(){
  if(!S.fileId){ syncSt='off'; updateSyncUI(); return; }
  const ok=await ensureToken();
  if(!ok){ syncSt='err'; updateSyncUI(); return; }
  try {
    const r=await fetch(
      `https://www.googleapis.com/drive/v3/files/${S.fileId}?alt=media&t=${Date.now()}`,
      {headers:{'Authorization':'Bearer '+S.token,'Cache-Control':'no-cache, no-store'}}
    );
    if(r.ok){
      let d;
      try{ d=await r.json(); }
      catch(e){
        // El archivo no es JSON válido — puede ser que Drive devolvió HTML de error
        const text=await r.text().catch(()=>'');
        syncSt='err';
        lastError='READ: respuesta no es JSON. Contenido: '+text.slice(0,120);
        updateSyncUI(); return;
      }
      const driveVer=d.version||0;
      if(driveVer>S.lastVer){
        if(d.checks)      S.checks      = d.checks;
        if(d.overrides)   S.overrides   = d.overrides;
        if(d.extras)      S.extras      = d.extras;
        if(d.customOrder) S.customOrder = d.customOrder;
        S.lastVer=driveVer;
        buildStores(); saveS(); render();
        toast('🔄 Lista actualizada desde el otro dispositivo');
      }
      syncSt='ok'; lastError='';
    } else {
      let errBody='';
      try{ const j=await r.json(); errBody=j?.error?.message||JSON.stringify(j); }catch(e){}
      syncSt='err';
      lastError=`READ ${r.status}: ${errBody}`;
    }
  } catch(e){
    syncSt='err';
    lastError='READ network error: '+e.message;
  }
  updateSyncUI();
}

function doSync(){ readFromD(); }
function startPoll(){
  clearInterval(pollTmr);
  if(!S.fileId||!S.clientId) return;
  pollTmr=setInterval(readFromD,10000);
}

function updateSyncUI(){
  const dot=document.getElementById('dot');
  const lbl=document.getElementById('slbl');
  if(!dot||!lbl) return;
  dot.className='dot';
  if(!S.fileId||!S.clientId){ lbl.textContent='⚙️ Toca para configurar Drive'; return; }
  if(syncSt==='ok'){
    dot.classList.add('ok');
    const ago=S.lastVer?Math.round((Date.now()-S.lastVer)/1000):null;
    lbl.textContent=ago?`Sync hace ${ago<60?ago+'s':Math.round(ago/60)+'min'} · cada 10s`:'Conectado a Drive';
  } else if(syncSt==='busy'){
    dot.classList.add('spin'); lbl.textContent='Sincronizando…';
  } else if(syncSt==='err'){
    dot.classList.add('err');
    // Mostrar el error exacto en la barra para diagnóstico
    lbl.textContent = lastError ? '⚠️ '+lastError.slice(0,60) : '⚠️ Error — toca ⚙️';
  } else {
    lbl.textContent='⚙️ Toca para configurar Drive';
  }
}
setInterval(()=>{ if(syncSt==='ok') updateSyncUI(); },5000);
function syncTap(){ if(!S.fileId||!S.clientId||syncSt==='err') openCfg(); else doSync(); }

/* ══════════════════════════════════════════════
   PANEL CONFIG
══════════════════════════════════════════════ */
function openCfg(){ renderCfg(); document.getElementById('cfg-overlay').style.display='flex'; document.getElementById('cfg-btn').classList.add('on'); }
function closeCfg(){ document.getElementById('cfg-overlay').style.display='none'; document.getElementById('cfg-btn').classList.remove('on'); }

function renderCfg(){
  const hasCid=!!S.clientId, hasFid=!!S.fileId, hasTok=!!S.token&&!tokenExpired();
  const connected=hasCid&&hasFid&&hasTok;
  let st='';
  if(connected) st=`<div class="status-row ok"><span style="font-size:16px">🟢</span><div><b>Conexión activa</b><span>Sync automático cada 10 seg · token vigente</span></div></div>`;
  else if(!hasCid) st=`<div class="status-row fail"><span style="font-size:16px">❌</span><div><b>Falta el Client ID</b><span>Pega tu Client ID de Google Cloud Console.</span></div></div>`;
  else if(!hasFid) st=`<div class="status-row fail"><span style="font-size:16px">❌</span><div><b>Falta el File ID</b><span>Sube super_estado.json a Drive y pega su ID.</span></div></div>`;
  else if(!hasTok) st=`<div class="status-row warn"><span style="font-size:16px">🔑</span><div><b>Token expirado</b><span>Toca "Conectar con Google" para renovar.</span></div></div>`;

  // Mostrar error detallado si existe
  const errHtml = lastError ? `<div class="status-row fail" style="margin-top:6px">
    <span style="font-size:16px">🔍</span>
    <div><b>Error detallado</b><span style="font-family:monospace;font-size:11px;word-break:break-all">${lastError}</span></div>
  </div>` : '';

  document.getElementById('cfg-sheet').innerHTML=`
    <div class="sheet-title">⚙️ Configuración de Drive</div>
    <div class="sheet-sub">Sincroniza la lista entre tus dispositivos.</div>
    ${st}
    ${errHtml}
    <div class="cfg-section">1 · Client ID de Google Cloud</div>
    <div class="field">
      <div class="field-lbl">Client ID</div>
      <input id="inp-cid" placeholder="123456-xxxx.apps.googleusercontent.com" value="${S.clientId}">
      <div class="field-hint">Google Cloud Console → Credenciales → OAuth 2.0 → Aplicación web</div>
    </div>
    <div class="cfg-section">2 · Archivo de estado en Drive</div>
    <div class="field">
      <div class="field-lbl">File ID del super_estado.json</div>
      <input id="inp-fid" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" value="${S.fileId}">
      <div class="field-hint">URL de Drive: …/file/d/<b>ESTE_ES_EL_ID</b>/view</div>
    </div>
    <div class="cfg-section">3 · Autorizar</div>
    <div style="font-size:12px;color:var(--text2);background:var(--ax);border-radius:var(--radx);padding:9px 11px;margin-bottom:10px;font-weight:500;line-height:1.5">
      ⚠️ Elige la cuenta que tiene el <b>super_estado.json</b> en Drive y que está en los <b>Usuarios de prueba</b> de Google Cloud.
    </div>
    <button class="btn-primary" onclick="saveCfgAndAuth()">
      ${connected?'↻ Reconectar con Google':'🔑 Guardar y conectar con Google'}
    </button>
    ${connected?`<button class="btn-secondary" onclick="saveOnlyAndClose()">Guardar sin reconectar</button>`:''}
    ${connected?`<button class="btn-secondary" style="color:var(--cm)" onclick="disconnect()">Desconectar cuenta</button>`:''}
    <button class="btn-secondary" onclick="closeCfg()">Cancelar</button>
    <div style="font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5;font-weight:500">
      💡 Si ves "acceso bloqueado": Google Cloud → Pantalla de consentimiento → Usuarios de prueba → agrega tu correo.
    </div>`;
}

function saveCfgAndAuth(){
  const cid=document.getElementById('inp-cid').value.trim();
  const fid=document.getElementById('inp-fid').value.trim();
  if(!cid){ toast('⚠️ El Client ID es obligatorio'); return; }
  if(!fid){ toast('⚠️ El File ID es obligatorio'); return; }
  S.clientId=cid; S.fileId=fid;
  S.token=''; S.tokenAt=0;
  tokenClient=null;
  saveS(); initGIS(); requestToken();
}

function saveOnlyAndClose(){
  const cid=document.getElementById('inp-cid').value.trim();
  const fid=document.getElementById('inp-fid').value.trim();
  if(cid) S.clientId=cid;
  if(fid) S.fileId=fid;
  saveS(); closeCfg(); startPoll(); doSync();
}

function disconnect(){
  if(!confirm('¿Desconectar la cuenta?')) return;
  S.token=''; S.tokenAt=0;
  clearInterval(pollTmr);
  syncSt='off'; saveS(); closeCfg(); updateSyncUI();
}

/* ══════════════════════════════════════════════
   AGREGAR ARTÍCULO
══════════════════════════════════════════════ */
let addSI=-1;

function openAdd(){
  document.getElementById('add-sheet').innerHTML=`
    <div class="sheet-title">¿A qué tienda lo agregas?</div>
    <div class="sheet-sub">Selecciona el grupo donde irá el nuevo artículo.</div>
    ${STORES.map((s,i)=>`
      <div class="store-opt so${s.c}" onclick="selectAddStore(${i})">
        <span class="so-emoji">${s.emoji}</span>
        <div class="so-info"><div class="so-name">${s.name}</div><div class="so-count">${s.items.length} artículos</div></div>
        <span style="color:var(--text3);font-size:16px">›</span>
      </div>`).join('')}
    <button class="btn-secondary" onclick="closeAdd()">Cancelar</button>`;
  document.getElementById('add-overlay').style.display='flex';
}

function selectAddStore(i){
  addSI=i; const s=STORES[i];
  document.getElementById('add-sheet').innerHTML=`
    <button class="back-btn" onclick="openAdd()">‹ Cambiar tienda</button>
    <div class="store-badge sb${s.c}">${s.emoji} ${s.name}</div>
    <div class="sheet-title">Nuevo artículo</div>
    <div class="sheet-sub">Se añadirá al final de la lista de ${s.name}.</div>
    <div class="field">
      <div class="field-lbl">Nombre</div>
      <input id="add-name" placeholder="Ej. Leche deslactosada…" maxlength="60" autocomplete="off"
        onkeydown="if(event.key==='Enter')document.getElementById('add-qty').focus()">
    </div>
    <div class="form-2col">
      <div class="field">
        <div class="field-lbl">Piezas</div>
        <input id="add-qty" type="number" inputmode="numeric" min="1" value="1"
          onkeydown="if(event.key==='Enter')document.getElementById('add-price').focus()">
      </div>
      <div class="field">
        <div class="field-lbl">Precio c/u ($)</div>
        <input id="add-price" type="number" inputmode="numeric" min="0"
          placeholder="${s.prices?'0':'Sin precio'}" ${s.prices?'':'disabled style="opacity:.45"'}
          onkeydown="if(event.key==='Enter')confirmAdd()">
      </div>
    </div>
    <button class="btn-primary" onclick="confirmAdd()">＋ Agregar a ${s.name}</button>
    <button class="btn-secondary" onclick="closeAdd()">Cancelar</button>`;
  setTimeout(()=>document.getElementById('add-name')?.focus(),200);
}

function confirmAdd(){
  const name=document.getElementById('add-name').value.trim();
  const qty=Math.max(1,parseInt(document.getElementById('add-qty').value)||1);
  const pe=document.getElementById('add-price');
  const price=pe&&!pe.disabled?(parseInt(pe.value)||0):null;
  if(!name){
    document.getElementById('add-name').style.borderColor='var(--cm)';
    setTimeout(()=>document.getElementById('add-name').style.borderColor='',1500);
    return;
  }
  const sid=STORES[addSI].id;
  if(!S.extras[sid]) S.extras[sid]=[];
  const item={n:name,q:qty};
  if(price!==null) item.p=price;
  S.extras[sid].push(item);
  buildStores(); saveS(); schedWrite();
  closeAdd(); toast(`✓ "${name}" agregado`); setTab(addSI);
}
function closeAdd(){ document.getElementById('add-overlay').style.display='none'; }

function toast(msg){
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
loadS();
render();
updateSyncUI();

const tp=new URLSearchParams(location.search).get('tab');
if(tp!==null) setTab(parseInt(tp,10));

if(S.clientId){
  window.addEventListener('load',()=>{ initGIS(); });
}
if(S.clientId&&S.fileId&&S.token){
  startPoll();
  setTimeout(doSync,1000);
} else {
  syncSt='off'; updateSyncUI();
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&S.fileId&&S.token) doSync();
});
window.addEventListener('focus',()=>{ if(S.fileId&&S.token) doSync(); });

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg=>{
    if(reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
    reg.addEventListener('updatefound',()=>{
      const sw=reg.installing;
      sw.addEventListener('statechange',()=>{
        if(sw.state==='installed'&&navigator.serviceWorker.controller){
          sw.postMessage({type:'SKIP_WAITING'});
          navigator.serviceWorker.addEventListener('controllerchange',()=>window.location.reload());
        }
      });
    });
  }).catch(()=>{});
}
</script>
</body>
</html>
