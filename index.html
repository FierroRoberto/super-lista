<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- PWA: Android / Chrome -->
<meta name="theme-color" content="#138A68">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Lista del Súper">
<!-- PWA: iOS / Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Súper">
<!-- PWA: Windows -->
<meta name="msapplication-TileColor" content="#138A68">
<meta name="msapplication-TileImage" content="icons/icon-144.png">
<!-- Manifest y íconos -->
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<title>Lista del Súper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#F4F2EE; --surface:#FFFFFF; --surface2:#F9F8F5;
  --border:#E4E0D8; --border2:#CCC8BF;
  --text:#1C1B18; --text2:#706D64; --text3:#A09D96;
  --teal:#0C5C47; --teal-mid:#138A68; --teal-light:#D8F0E8; --teal-xlight:#EEF9F4;
  --amber:#7A4508; --amber-mid:#B86B12; --amber-light:#FDECD3; --amber-xlight:#FEF6EA;
  --coral:#8C3219; --coral-mid:#C94E2A; --coral-light:#FAE4DB; --coral-xlight:#FDF2EE;
  --purple:#4840A8; --purple-mid:#7068CC; --purple-light:#E8E6FC; --purple-xlight:#F3F2FE;
  --rad:14px; --rad-sm:9px; --rad-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 8px 24px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
}
html { font-size:16px; }
body {
  font-family:'Nunito',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100dvh; max-width:430px;
  margin:0 auto; -webkit-font-smoothing:antialiased;
}

/* ── Header ── */
.app-header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:14px 16px 12px; position:sticky; top:0; z-index:100;
  box-shadow:var(--shadow);
}
.header-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.header-brand { display:flex; align-items:center; gap:8px; }
.brand-icon {
  width:34px; height:34px; border-radius:9px;
  background:linear-gradient(135deg,var(--teal-mid),var(--teal));
  display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0;
  box-shadow:0 2px 6px rgba(19,138,104,.35);
}
.brand-text h1 { font-size:16px; font-weight:800; letter-spacing:-.4px; }
.brand-text p  { font-size:11.5px; color:var(--text2); margin-top:1px; font-weight:500; }
.header-actions { display:flex; gap:6px; }
.icon-btn {
  width:34px; height:34px; border-radius:9px;
  border:1.5px solid var(--border); background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:15px; transition:background .15s;
}
.icon-btn:active { background:var(--bg); }
.icon-btn.active-mode { background:var(--teal-xlight); border-color:var(--teal-mid); }

.sync-bar {
  display:flex; align-items:center; gap:7px;
  padding:7px 10px; background:var(--surface2);
  border:1px solid var(--border); border-radius:var(--rad-xs); font-size:11.5px;
}
.sync-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:var(--border2); transition:background .3s; }
.sync-dot.ok      { background:#22C78B; }
.sync-dot.syncing { background:var(--amber-mid); animation:blink 1s ease-in-out infinite; }
.sync-dot.error   { background:var(--coral-mid); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
.sync-label { flex:1; color:var(--text2); font-weight:500; }
.sync-action { font-size:11px; font-weight:700; color:var(--teal-mid); background:none; border:none; cursor:pointer; }

/* ── Tabs ── */
.tabs-wrap {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:10px 14px; display:flex; gap:7px; overflow-x:auto; scrollbar-width:none;
}
.tabs-wrap::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0; padding:6px 13px; border-radius:20px;
  font-size:12px; font-weight:700; border:1.5px solid transparent;
  cursor:pointer; transition:all .18s; background:transparent; white-space:nowrap;
}
.tab-all { color:var(--text2); border-color:var(--border); }
.tab-all.active { background:var(--text); color:#fff; border-color:var(--text); }
.tab-0 { color:var(--teal); border-color:var(--teal-light); }
.tab-0.active { background:var(--teal); color:#fff; border-color:var(--teal); }
.tab-1 { color:var(--amber); border-color:var(--amber-light); }
.tab-1.active { background:var(--amber-mid); color:#fff; border-color:var(--amber-mid); }
.tab-2 { color:var(--coral); border-color:var(--coral-light); }
.tab-2.active { background:var(--coral-mid); color:#fff; border-color:var(--coral-mid); }
.tab-3 { color:var(--purple); border-color:var(--purple-light); }
.tab-3.active { background:var(--purple-mid); color:#fff; border-color:var(--purple-mid); }

/* ── Edit mode banner ── */
.edit-banner {
  background:var(--teal-xlight); border-bottom:1px solid var(--teal-light);
  padding:8px 16px; display:flex; align-items:center; gap:8px;
  font-size:12px; font-weight:700; color:var(--teal);
}
.edit-banner span { flex:1; }

/* ── Content ── */
.content { padding:14px 13px 40px; }

/* Total banner */
.total-banner {
  background:var(--text); color:#fff; border-radius:var(--rad);
  padding:14px 16px; display:flex; align-items:center;
  justify-content:space-between; margin-bottom:14px; box-shadow:var(--shadow-md);
}
.total-lbl { font-size:11px; font-weight:600; opacity:.55; text-transform:uppercase; letter-spacing:.6px; }
.total-amt { font-size:26px; font-weight:800; letter-spacing:-1px; margin-top:2px; }
.total-prog-lbl { font-size:11px; opacity:.55; font-weight:600; text-align:right; }
.total-prog-val { font-size:18px; font-weight:800; margin-top:2px; text-align:right; }

/* Store cards */
.store-card {
  background:var(--surface); border-radius:var(--rad);
  border:1px solid var(--border); margin-bottom:13px;
  overflow:hidden; box-shadow:var(--shadow);
  animation:fadeUp .25s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.store-head {
  padding:12px 14px 10px; display:flex;
  align-items:flex-start; justify-content:space-between; border-bottom:1px solid var(--border);
}
.sh-0{background:var(--teal-xlight)} .sh-1{background:var(--amber-xlight)}
.sh-2{background:var(--coral-xlight)} .sh-3{background:var(--purple-xlight)}
.store-title { font-size:14px; font-weight:800; letter-spacing:-.3px; }
.store-subtitle { font-size:11.5px; margin-top:3px; font-weight:500; }
.st-0{color:var(--teal-mid)} .st-1{color:var(--amber-mid)}
.st-2{color:var(--coral-mid)} .st-3{color:var(--purple-mid)}

.reset-btn {
  font-size:11.5px; font-weight:700; padding:5px 11px; border-radius:20px;
  border:1.5px solid; cursor:pointer; background:var(--surface);
  transition:all .15s; white-space:nowrap;
}
.rb-0{color:var(--teal);border-color:var(--teal-mid)} .rb-0:active{background:var(--teal);color:#fff}
.rb-1{color:var(--amber);border-color:var(--amber-mid)} .rb-1:active{background:var(--amber-mid);color:#fff}
.rb-2{color:var(--coral);border-color:var(--coral-mid)} .rb-2:active{background:var(--coral-mid);color:#fff}
.rb-3{color:var(--purple);border-color:var(--purple-mid)} .rb-3:active{background:var(--purple-mid);color:#fff}

/* Progress */
.prog-wrap { padding:8px 14px 10px; display:flex; align-items:center; gap:8px; }
.prog-bar { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; border-radius:2px; transition:width .4s cubic-bezier(.4,0,.2,1); }
.pf-0{background:var(--teal-mid)} .pf-1{background:var(--amber-mid)}
.pf-2{background:var(--coral-mid)} .pf-3{background:var(--purple-mid)}
.prog-pct { font-size:11px; font-weight:700; color:var(--text3); min-width:28px; text-align:right; }

/* ── Item rows — normal mode ── */
.item-row {
  display:flex; align-items:center; gap:11px;
  padding:10px 14px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .1s; user-select:none;
}
.item-row:last-child { border-bottom:none; }
.item-row:active { background:var(--bg); }
.item-row.done { opacity:.42; }
.checkbox {
  width:21px; height:21px; border-radius:6px;
  border:1.5px solid var(--border2); background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
}
.checkbox.on-0{background:var(--teal-mid);border-color:var(--teal-mid)}
.checkbox.on-1{background:var(--amber-mid);border-color:var(--amber-mid)}
.checkbox.on-2{background:var(--coral-mid);border-color:var(--coral-mid)}
.checkbox.on-3{background:var(--purple-mid);border-color:var(--purple-mid)}
.checkbox svg { display:none; }
.checkbox.on-0 svg,.checkbox.on-1 svg,.checkbox.on-2 svg,.checkbox.on-3 svg { display:block; }
.item-text { flex:1; min-width:0; }
.item-name { font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-row.done .item-name { text-decoration:line-through; }
.item-qty  { font-size:11.5px; color:var(--text2); margin-top:1px; font-weight:500; }
.item-price-tag { font-size:12.5px; font-weight:700; color:var(--text3); flex-shrink:0; }
.item-price-tag.checked { color:var(--teal-mid); }

/* ── Item rows — edit mode ── */
.item-row-edit {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; border-bottom:1px solid var(--border); background:var(--surface);
}
.item-row-edit:last-child { border-bottom:none; }
.edit-name { font-size:13px; font-weight:600; flex:1; color:var(--text); }
.edit-lbl { font-size:10.5px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.4px; text-align:center; }

/* Stepper for quantity */
.stepper { display:flex; align-items:center; gap:0; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
.stepper-btn {
  width:28px; height:28px; border:none; background:var(--surface2);
  font-size:16px; font-weight:700; cursor:pointer; color:var(--text2);
  display:flex; align-items:center; justify-content:center;
  transition:background .12s; flex-shrink:0; line-height:1;
}
.stepper-btn:active { background:var(--border); }
.stepper-val {
  min-width:28px; text-align:center; font-size:13px; font-weight:800;
  color:var(--text); padding:0 4px; border-left:1px solid var(--border); border-right:1px solid var(--border);
  height:28px; line-height:28px;
}

/* Price inline input */
.price-field {
  display:flex; align-items:center; gap:3px; border:1.5px solid var(--border);
  border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--surface2);
  height:28px; padding:0 7px;
}
.price-field span { font-size:12px; font-weight:700; color:var(--text3); }
.price-input {
  width:44px; border:none; background:transparent; font-size:13px;
  font-weight:800; color:var(--text); font-family:inherit;
  outline:none; text-align:right;
}
.price-field:focus-within { border-color:var(--teal-mid); background:var(--surface); }

/* ── Subtotal ── */
.subtotal-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 14px; background:var(--surface2); border-top:1px solid var(--border);
}
.sub-lbl { font-size:12px; color:var(--text2); font-weight:600; }
.sub-val { font-size:15px; font-weight:800; }
.sv-0{color:var(--teal)} .sv-1{color:var(--amber)} .sv-2{color:var(--coral)} .sv-3{color:var(--purple)}

/* ── Drive panel ── */
.drive-panel {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--rad); padding:16px; margin-bottom:14px; box-shadow:var(--shadow);
}
.drive-header { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.drive-logo { width:28px; height:28px; flex-shrink:0; }
.drive-title-txt { font-size:14px; font-weight:800; }
.drive-subtitle  { font-size:11.5px; color:var(--text2); font-weight:500; }
.field-group { margin-bottom:10px; }
.field-label { font-size:11px; font-weight:700; color:var(--text2); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
.field-input {
  width:100%; font-size:13px; font-family:inherit; font-weight:500;
  padding:9px 11px; border:1.5px solid var(--border); border-radius:var(--rad-sm);
  background:var(--bg); color:var(--text); outline:none; transition:border-color .15s;
}
.field-input:focus { border-color:var(--teal-mid); background:var(--surface); }
.field-input::placeholder { color:var(--text3); }
.save-btn {
  width:100%; padding:10px; background:var(--teal-mid); color:#fff;
  border:none; border-radius:var(--rad-sm); font-size:14px; font-weight:700;
  font-family:inherit; cursor:pointer; transition:opacity .15s;
}
.save-btn:active { opacity:.85; }
.drive-hint {
  font-size:11.5px; color:var(--text2); line-height:1.55; margin-top:10px;
  padding:9px 10px; background:var(--teal-xlight); border-radius:var(--rad-xs); font-weight:500;
}
.drive-hint a { color:var(--teal); font-weight:700; text-decoration:none; }

/* ── OAuth button ── */
.oauth-btn {
  width:100%; padding:11px 14px; border:none; border-radius:var(--rad-sm);
  font-size:14px; font-weight:800; font-family:inherit; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:9px;
  transition:opacity .15s; margin-bottom:8px;
}
.oauth-btn.google {
  background:#fff; color:#3c4043; border:1.5px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.12);
}
.oauth-btn.google:active { opacity:.8; }
.oauth-btn.renew {
  background:var(--amber-xlight); color:var(--amber);
  border:1.5px solid var(--amber-light);
}
.oauth-btn.renew:active { opacity:.8; }

/* Token status pill */
.token-pill {
  display:inline-flex; align-items:center; gap:5px;
  font-size:11.5px; font-weight:700; padding:4px 9px;
  border-radius:20px; margin-bottom:10px;
}
.token-pill.ok     { background:var(--teal-xlight);  color:var(--teal); }
.token-pill.expiry { background:var(--amber-xlight); color:var(--amber); }
.token-pill.none   { background:var(--bg); color:var(--text3); border:1px solid var(--border); }

/* Divider */
.or-divider {
  display:flex; align-items:center; gap:8px; margin:10px 0;
  font-size:11px; font-weight:700; color:var(--text3);
}
.or-divider::before,.or-divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}

/* OAuth popup overlay */
.oauth-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:200; animation:fadeIn .2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.oauth-sheet {
  background:var(--surface); border-radius:var(--rad) var(--rad) 0 0;
  padding:20px 20px 32px; width:100%; max-width:430px;
  animation:slideUp .25s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp { from{transform:translateY(60px)} to{transform:none} }
.oauth-sheet h2 { font-size:16px; font-weight:800; margin-bottom:4px; }
.oauth-sheet p  { font-size:12.5px; color:var(--text2); font-weight:500; line-height:1.5; margin-bottom:16px; }
.oauth-steps { margin-bottom:18px; }
.oauth-step {
  display:flex; gap:10px; align-items:flex-start;
  padding:7px 0; border-bottom:1px solid var(--border); font-size:12.5px;
}
.oauth-step:last-child { border-bottom:none; }
.step-num {
  width:20px; height:20px; border-radius:50%; flex-shrink:0;
  background:var(--teal-mid); color:#fff;
  font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center;
}
.step-txt { flex:1; color:var(--text2); font-weight:500; padding-top:1px; line-height:1.4; }
.step-txt b { color:var(--text); }
.oauth-open-btn {
  width:100%; padding:12px; background:var(--teal-mid); color:#fff;
  border:none; border-radius:var(--rad-sm); font-size:14px; font-weight:800;
  font-family:inherit; cursor:pointer; margin-bottom:10px;
}
.oauth-open-btn:active { opacity:.85; }
.oauth-paste-row { display:flex; gap:8px; align-items:stretch; }
.oauth-paste-input {
  flex:1; font-size:13px; font-family:inherit; font-weight:500;
  padding:9px 11px; border:1.5px solid var(--border); border-radius:var(--rad-sm);
  background:var(--bg); color:var(--text); outline:none;
}
.oauth-paste-input:focus { border-color:var(--teal-mid); }
.oauth-paste-btn {
  padding:9px 14px; background:var(--teal); color:#fff;
  border:none; border-radius:var(--rad-sm); font-size:13px; font-weight:800;
  font-family:inherit; cursor:pointer; white-space:nowrap;
}
.oauth-cancel {
  width:100%; padding:9px; background:none; border:1.5px solid var(--border);
  border-radius:var(--rad-sm); font-size:13px; font-weight:700; color:var(--text2);
  font-family:inherit; cursor:pointer; margin-top:8px;
}
/* ── FAB (botón flotante agregar) ── */
.fab {
  position:fixed; bottom:24px; right:50%;
  transform:translateX(50%);
  /* centrado en el max-width de 430px */
  margin-right:calc(max(0px, (100vw - 430px) / -2));
  background:var(--teal-mid); color:#fff;
  border:none; border-radius:50px;
  padding:13px 22px; font-size:15px; font-weight:800;
  font-family:inherit; cursor:pointer;
  display:flex; align-items:center; gap:8px;
  box-shadow:0 4px 16px rgba(19,138,104,.45), 0 2px 6px rgba(0,0,0,.15);
  z-index:150; transition:transform .15s, box-shadow .15s;
  white-space:nowrap;
}
.fab:active { transform:translateX(50%) scale(.95); box-shadow:0 2px 8px rgba(19,138,104,.3); }
.fab-icon { font-size:18px; line-height:1; }

/* ── Add-item overlay ── */
.add-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:200; animation:fadeIn .2s ease;
}
/* Step 1 — elegir tienda */
.store-picker {
  background:var(--surface); border-radius:var(--rad) var(--rad) 0 0;
  padding:20px 20px 32px; width:100%; max-width:430px;
  animation:slideUp .25s cubic-bezier(.4,0,.2,1);
}
.sheet-title {
  font-size:16px; font-weight:800; margin-bottom:4px; letter-spacing:-.3px;
}
.sheet-sub {
  font-size:12.5px; color:var(--text2); font-weight:500; margin-bottom:18px;
}
.store-options { display:flex; flex-direction:column; gap:9px; }
.store-opt {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-radius:var(--rad-sm);
  border:1.5px solid var(--border); cursor:pointer;
  transition:all .15s; background:var(--surface);
}
.store-opt:active { opacity:.8; }
.store-opt.so-0:active,.store-opt.so-0.selected { background:var(--teal-xlight);  border-color:var(--teal-mid); }
.store-opt.so-1:active,.store-opt.so-1.selected { background:var(--amber-xlight); border-color:var(--amber-mid); }
.store-opt.so-2:active,.store-opt.so-2.selected { background:var(--coral-xlight); border-color:var(--coral-mid); }
.store-opt.so-3:active,.store-opt.so-3.selected { background:var(--purple-xlight);border-color:var(--purple-mid); }
.store-opt-emoji { font-size:22px; }
.store-opt-info { flex:1; }
.store-opt-name { font-size:14px; font-weight:800; }
.store-opt-count { font-size:11.5px; color:var(--text2); font-weight:500; margin-top:2px; }
.store-opt-arrow { font-size:16px; color:var(--text3); }

/* Step 2 — formulario del artículo */
.add-form {
  background:var(--surface); border-radius:var(--rad) var(--rad) 0 0;
  padding:20px 20px 32px; width:100%; max-width:430px;
  animation:slideUp .25s cubic-bezier(.4,0,.2,1);
}
.add-form-back {
  display:flex; align-items:center; gap:6px; margin-bottom:14px;
  background:none; border:none; cursor:pointer; padding:0;
  font-size:13px; font-weight:700; color:var(--text2); font-family:inherit;
}
.form-store-badge {
  display:inline-flex; align-items:center; gap:5px;
  font-size:12px; font-weight:700; padding:4px 10px;
  border-radius:20px; margin-bottom:14px;
}
.fsb-0{background:var(--teal-xlight);color:var(--teal)}
.fsb-1{background:var(--amber-xlight);color:var(--amber)}
.fsb-2{background:var(--coral-xlight);color:var(--coral)}
.fsb-3{background:var(--purple-xlight);color:var(--purple)}

.form-row { margin-bottom:12px; }
.form-label { font-size:11px; font-weight:700; color:var(--text2); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
.form-input {
  width:100%; font-size:14px; font-family:inherit; font-weight:600;
  padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--rad-sm);
  background:var(--bg); color:var(--text); outline:none; transition:border-color .15s;
}
.form-input:focus { border-color:var(--teal-mid); background:var(--surface); }
.form-input::placeholder { color:var(--text3); font-weight:500; }
.form-row-2col { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }

.add-confirm-btn {
  width:100%; padding:13px; border:none; border-radius:var(--rad-sm);
  font-size:15px; font-weight:800; font-family:inherit; cursor:pointer;
  color:#fff; transition:opacity .15s; margin-top:4px;
}
.add-confirm-btn:active { opacity:.85; }
.acb-0{background:var(--teal-mid)}
.acb-1{background:var(--amber-mid)}
.acb-2{background:var(--coral-mid)}
.acb-3{background:var(--purple-mid)}

.add-cancel-btn {
  width:100%; padding:10px; background:none; border:1.5px solid var(--border);
  border-radius:var(--rad-sm); font-size:13px; font-weight:700;
  color:var(--text2); font-family:inherit; cursor:pointer; margin-top:8px;
}
/* Feedback toast */
.toast {
  position:fixed; bottom:88px; left:50%; transform:translateX(-50%);
  background:var(--text); color:#fff; border-radius:50px;
  padding:10px 20px; font-size:13px; font-weight:700;
  z-index:300; white-space:nowrap;
  animation:toastIn .25s ease, toastOut .3s ease 1.8s forwards;
  pointer-events:none;
}
@keyframes toastIn  { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes toastOut { from{opacity:1} to{opacity:0} }
/* ── Sync bar clickable ── */
.sync-bar { cursor:pointer; }
.sync-bar:active { background:var(--border); }

/* ── Diagnóstico Drive ── */
.diag-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:300; animation:fadeIn .2s ease;
}
.diag-sheet {
  background:var(--surface); border-radius:var(--rad) var(--rad) 0 0;
  padding:20px 20px 36px; width:100%; max-width:430px;
  animation:slideUp .25s cubic-bezier(.4,0,.2,1);
  max-height:88vh; overflow-y:auto;
}
.diag-title { font-size:16px; font-weight:800; margin-bottom:14px; }
.diag-row {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px; border-radius:var(--rad-xs);
  margin-bottom:6px; font-size:13px;
}
.diag-row.ok     { background:var(--teal-xlight); }
.diag-row.fail   { background:var(--coral-xlight); }
.diag-row.warn   { background:var(--amber-xlight); }
.diag-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
.diag-text { flex:1; }
.diag-text b { display:block; font-weight:800; margin-bottom:2px; color:var(--text); }
.diag-text span { color:var(--text2); font-size:12px; font-weight:500; line-height:1.4; }
.diag-fix-btn {
  margin-top:10px; padding:8px 14px; border:none; border-radius:var(--rad-xs);
  font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; width:100%;
}
.diag-fix-btn.teal   { background:var(--teal-mid);  color:#fff; }
.diag-fix-btn.amber  { background:var(--amber-mid); color:#fff; }
.diag-close {
  width:100%; padding:11px; background:none; border:1.5px solid var(--border);
  border-radius:var(--rad-sm); font-size:14px; font-weight:700; color:var(--text2);
  font-family:inherit; cursor:pointer; margin-top:12px;
}
.diag-sync-now {
  width:100%; padding:11px; background:var(--teal-mid); color:#fff;
  border:none; border-radius:var(--rad-sm); font-size:14px; font-weight:800;
  font-family:inherit; cursor:pointer; margin-bottom:8px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.diag-sync-now:active { opacity:.85; }
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="header-top">
    <div class="header-brand">
      <div class="brand-icon">🛒</div>
      <div class="brand-text">
        <h1>Lista del Súper</h1>
        <p id="global-stats">Cargando…</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="edit-toggle-btn" onclick="toggleEditMode()" title="Modo edición">✏️</button>
      <button class="icon-btn" onclick="toggleDrivePanel()" title="Configurar Drive">⚙️</button>
    </div>
  </div>
  <div class="sync-bar" id="sync-bar" onclick="syncBarTap()">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-label" id="sync-label">Verificando configuración…</span>
    <button class="sync-action" id="sync-btn" onclick="event.stopPropagation();manualSync()">↻ Sync</button>
  </div>
</header>

<!-- Edit mode banner -->
<div id="edit-banner" class="edit-banner" style="display:none">
  <span>✏️ Modo edición — toca piezas o precio para cambiar</span>
  <button onclick="toggleEditMode()" style="font-size:11px;font-weight:800;color:var(--teal);background:none;border:none;cursor:pointer;">Listo ✓</button>
</div>

<!-- Tabs -->
<nav class="tabs-wrap">
  <button class="tab tab-all active" onclick="setTab(-1)">Todas</button>
  <button class="tab tab-0" onclick="setTab(0)">🏪 Walmart</button>
  <button class="tab tab-1" onclick="setTab(1)">🏪 SAM'S</button>
  <button class="tab tab-2" onclick="setTab(2)">🏪 HEB</button>
  <button class="tab tab-3" onclick="setTab(3)">🥦 Frutas</button>
</nav>

<main class="content" id="main-content"></main>

<!-- FAB — Agregar artículo -->
<button class="fab" id="fab-btn" onclick="openAddSheet()">
  <span class="fab-icon">＋</span> Agregar artículo
</button>

<!-- OVERLAY Step 1: elegir tienda -->
<div class="add-overlay" id="add-overlay-store" style="display:none" onclick="addOverlayClick(event,'add-overlay-store')">
  <div class="store-picker">
    <div class="sheet-title">¿A qué tienda lo agregas?</div>
    <div class="sheet-sub">Selecciona el grupo donde irá el nuevo artículo</div>
    <div class="store-options" id="store-options-list"></div>
    <button class="add-cancel-btn" style="margin-top:14px" onclick="closeAddSheet()">Cancelar</button>
  </div>
</div>

<!-- OVERLAY Step 2: formulario del artículo -->
<div class="add-overlay" id="add-overlay-form" style="display:none" onclick="addOverlayClick(event,'add-overlay-form')">
  <div class="add-form" id="add-form-content"></div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Diagnóstico Drive -->
<div class="diag-overlay" id="diag-overlay" style="display:none" onclick="if(event.target===this)closeDiag()">
  <div class="diag-sheet" id="diag-sheet"></div>
</div>

<!-- OAuth Sheet — flujo completo con refresh automático -->
<div class="oauth-overlay" id="oauth-overlay" style="display:none" onclick="if(event.target===this)closeOAuthSheet()">
  <div class="oauth-sheet" id="oauth-sheet-content">
    <!-- Se rellena dinámicamente por renderOAuthSheet() -->
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA — fuente base del Excel
═══════════════════════════════════════ */
const BASE_STORES = [
  {
    id:'walmart', name:'Walmart', emoji:'🏪', c:'0', prices:true,
    items:[
      {n:'Pan Higos',q:1,p:50},{n:'Huevo',q:2,p:80},{n:'Chorizo',q:2,p:35},
      {n:'Tocino San Rafael',q:1,p:100},{n:'Jamón',q:1,p:70},{n:'Queso',q:1,p:100},
      {n:'Bolillos',q:1,p:20},{n:'Yogurt Bebible',q:1,p:110},{n:'Crema',q:1,p:40},
      {n:'Mantequilla',q:1,p:80},{n:'Yogurt Griego Danone',q:1,p:55},{n:'Leche',q:1,p:80},
      {n:'Jugo Naranja',q:1,p:50},{n:'Pan Artesano',q:1,p:60},{n:'Tortilla Harina',q:1,p:40},
      {n:'Pan Empanizar',q:1,p:30},{n:'Crema Cacahuate',q:1,p:70},{n:'Tostadas',q:1,p:40},
      {n:'Harina Hot Cakes',q:1,p:40},{n:'Media Crema',q:2,p:20},{n:'Clavel',q:1,p:20},
      {n:'Lechera',q:1,p:25},{n:'Choco Don Gustavo',q:1,p:35},{n:'Galletas Saladas',q:1,p:25},
      {n:'Cerillos',q:1,p:20},{n:'Granola',q:1,p:80},{n:'Papas Francesa',q:1,p:70},
      {n:'Vinagre',q:1,p:20},{n:'Aceite Oliva-Aguacate',q:1,p:150},{n:'Frijol Isadora',q:3,p:16},
      {n:'Azúcar',q:1,p:40},{n:'Arroz',q:1,p:30},{n:'Frijol',q:1,p:16},
      {n:'Aderezo Ranch',q:1,p:30},{n:'Aderezo Mil Islas',q:1,p:30},{n:'Catsup',q:1,p:80},
      {n:'Mostaza',q:1,p:40},{n:'Mayonesa',q:1,p:80},{n:'Sopa Fideo',q:1,p:15},
      {n:'Spagueti',q:1,p:15},{n:'Atún',q:2,p:20},{n:'Lata Elote',q:1,p:20},
      {n:'Lata Campesina',q:1,p:20},{n:'Chile San Marcos',q:1,p:35},{n:'Tilapia',q:2,p:40},
      {n:'Bistec',q:3,p:125},{n:'Desechable',q:1,p:30},{n:'Servitoallas',q:2,p:30},
      {n:'Papel Aluminio',q:1,p:40},{n:'Pañales',q:1,p:200},{n:'Croquetas',q:1,p:130},
      {n:'Lavatrastes Axion',q:1,p:70},{n:'Poett',q:1,p:40},{n:'Cloro',q:1,p:30},
      {n:'Detergente en polvo',q:1,p:35},{n:'Bold Detergente Ropa',q:1,p:140},
      {n:'Sobres',q:3,p:80},{n:'Desodorante Rexona',q:1,p:70},{n:'Desodorante Obao',q:1,p:45},
      {n:'Desodorante Axe Azul',q:1,p:50},{n:'Desodorante Mío',q:1,p:70},
      {n:'Cepillos Dientes',q:1,p:50},{n:'Pasta Dientes',q:2,p:50},
      {n:'Toalla Saba Buenas Noches',q:1,p:50},{n:'Saba Panti Multiestilos',q:1,p:30},
      {n:'Papel Pétalo Rendimax',q:1,p:180},{n:'Aceite Almendra',q:1,p:45},{n:'Toallas Húmedas',q:1,p:45}
    ]
  },
  {
    id:'sams', name:"SAM'S Club", emoji:'🏪', c:'1', prices:true,
    items:[
      {n:'Uva',q:1,p:110},{n:'Pollo',q:1,p:125},{n:'Microdyn',q:1,p:100},
      {n:'Guarnición',q:1,p:100},{n:'Leche Soya',q:1,p:180},{n:'Jabón Barra',q:1,p:150}
    ]
  },
  {
    id:'heb', name:'HEB', emoji:'🏪', c:'2', prices:true,
    items:[
      {n:'Molida Res',q:1,p:125},{n:'Café',q:1,p:150},
      {n:'Galleta Arroz',q:1,p:35},{n:'Manteca Cerdo',q:1,p:50}
    ]
  },
  {
    id:'frutas', name:'Frutas y Verduras', emoji:'🥦', c:'3', prices:false,
    items:[
      {n:'Papaya',q:1},{n:'Plátano',q:4},{n:'Limón',q:10},{n:'Papa',q:6},
      {n:'Cebolla',q:2},{n:'Tomatillo',q:6},{n:'Ajo',q:2},{n:'Pepino',q:1},
      {n:'Cilantro',q:1},{n:'Sandía',q:1},{n:'Piña',q:1},{n:'Manzana',q:6},
      {n:'Mandarina',q:6},{n:'Naranja',q:10},{n:'Mango',q:10},{n:'Tomate',q:6},
      {n:'Lechuga',q:1},{n:'Papas Fritas',q:1},{n:'Aguacate',q:4}
    ]
  }
];

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let state = {
  checks:   { walmart:{}, sams:{}, heb:{}, frutas:{} },
  overrides: {},
  customItems: {},
  driveToken:'', driveFileId:'',
  refreshToken: '',
  tokenSavedAt: null,
  oauthClientId:'', oauthClientSecret:'', oauthGasUrl:'',
  lastSync:null
};
let STORES = [];          // computed: BASE_STORES + overrides applied
let activeTab  = -1;
let editMode   = false;
let showDrive  = false;
let syncStatus = 'offline';
let syncTimer  = null;
let driveWriteTimer = null;

/* ═══════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════ */
function load() {
  try {
    const s = localStorage.getItem('superLista_v4');
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e) {}
  buildStores();
}
function save() {
  try { localStorage.setItem('superLista_v4', JSON.stringify(state)); } catch(e) {}
}

/* ═══════════════════════════════════════
   BUILD STORES (apply overrides)
═══════════════════════════════════════ */
function buildStores() {
  STORES = BASE_STORES.map(store => {
    // Restaurar artículos personalizados guardados
    const custom = (state.customItems && state.customItems[store.id]) || [];
    const allItems = [...store.items, ...custom];
    return {
      ...store,
      items: allItems.map((item, i) => {
        const key = store.id + '_' + i;
        const ov  = state.overrides[key] || {};
        return { n: item.n, q: ov.q ?? item.q, p: ov.p ?? item.p };
      })
    };
  });
}

/* ═══════════════════════════════════════
   OVERRIDES
═══════════════════════════════════════ */
function setOverride(sid, i, field, value) {
  const key = sid + '_' + i;
  if (!state.overrides[key]) state.overrides[key] = {};
  state.overrides[key][field] = value;
  buildStores();
  save();
  scheduleDriveWrite();
  renderStats();          // update header + subtotals without full re-render
}
function changeQty(sid, i, delta) {
  const storeIdx = STORES.findIndex(s => s.id === sid);
  const current  = STORES[storeIdx].items[i].q;
  const next     = Math.max(1, current + delta);
  if (next === current) return;
  setOverride(sid, i, 'q', next);
  // update stepper val inline
  const el = document.getElementById('qval_' + sid + '_' + i);
  if (el) el.textContent = next;
  updateSubtotalInline(storeIdx);
  updateTotalBanner();
}
function changePrice(sid, i, raw) {
  const val = parseInt(raw, 10);
  if (isNaN(val) || val < 0) return;
  setOverride(sid, i, 'p', val);
  updateSubtotalInline(STORES.findIndex(s => s.id === sid));
  updateTotalBanner();
}

/* ═══════════════════════════════════════
   CHECKS
═══════════════════════════════════════ */
function isChecked(sid, i) { return !!(state.checks[sid] && state.checks[sid][i]); }
function toggle(sid, i) {
  if (editMode) return;
  if (!state.checks[sid]) state.checks[sid] = {};
  state.checks[sid][i] = !state.checks[sid][i];
  save(); render(); scheduleDriveWrite();
}
function resetStore(sid) {
  state.checks[sid] = {};
  save(); render(); scheduleDriveWrite();
}

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
function storeStats(si) {
  const s = STORES[si];
  const total = s.items.length;
  const done  = Object.values(state.checks[s.id] || {}).filter(Boolean).length;
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}
function subtotal(si) {
  const s = STORES[si];
  if (!s.prices) return null;
  return s.items.reduce((sum, item, i) => isChecked(s.id, i) ? sum + item.q * (item.p || 0) : sum, 0);
}
function grandTotal() {
  return STORES.reduce((sum, _, i) => { const sub = subtotal(i); return sub != null ? sum + sub : sum; }, 0);
}
function globalDone()  { return STORES.reduce((s, _, i) => s + storeStats(i).done, 0); }
function globalTotal() { return STORES.reduce((s, st) => s + st.items.length, 0); }

/* ═══════════════════════════════════════
   INLINE UPDATES (no full re-render)
═══════════════════════════════════════ */
function renderStats() {
  const done = globalDone(), total = globalTotal(), gt = grandTotal();
  const el = document.getElementById('global-stats');
  if (el) el.textContent = `${done}/${total} artículos · $${gt.toLocaleString('es-MX')} marcados`;
}
function updateSubtotalInline(si) {
  const sub = subtotal(si);
  const el  = document.getElementById('subtotal_' + STORES[si].id);
  if (el && sub !== null) el.textContent = '$' + sub.toLocaleString('es-MX');
  const sub2 = document.getElementById('store-subtitle_' + STORES[si].id);
  const st   = storeStats(si);
  if (sub2) sub2.textContent = `${st.done} de ${st.total} artículos marcados${sub !== null ? ' · $' + sub.toLocaleString('es-MX') : ''}`;
}
function updateTotalBanner() {
  const gt = grandTotal();
  const el = document.getElementById('total-amt');
  if (el) el.textContent = '$' + gt.toLocaleString('es-MX');
  renderStats();
}

/* ═══════════════════════════════════════
   TABS / EDIT MODE
═══════════════════════════════════════ */
function setTab(idx) {
  activeTab = idx;
  document.querySelectorAll('.tab').forEach((t, i) => {
    const map = [-1, 0, 1, 2, 3];
    t.classList.toggle('active', map[i] === idx);
  });
  render();
}
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-toggle-btn');
  const ban = document.getElementById('edit-banner');
  if (btn) btn.classList.toggle('active-mode', editMode);
  if (ban) ban.style.display = editMode ? 'flex' : 'none';
  render();
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function checkSVG() {
  return `<svg width="12" height="10" viewBox="0 0 12 10" fill="none">
    <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function renderItemNormal(s, item, i) {
  const ck = isChecked(s.id, i);
  const rowTotal = s.prices ? item.q * (item.p || 0) : null;
  return `<div class="item-row${ck ? ' done' : ''}" onclick="toggle('${s.id}',${i})">
    <div class="checkbox${ck ? ' on-' + s.c : ''}">${ck ? checkSVG() : ''}</div>
    <div class="item-text">
      <div class="item-name">${item.n}</div>
      <div class="item-qty">${item.q} ${item.q > 1 ? 'pzas' : 'pza'}${item.p ? ' · $' + item.p + ' c/u' : ''}</div>
    </div>
    ${rowTotal !== null ? `<div class="item-price-tag${ck ? ' checked' : ''}">$${rowTotal}</div>` : ''}
  </div>`;
}

function renderItemEdit(s, item, i) {
  const hasPrices = s.prices;
  return `<div class="item-row-edit">
    <div class="edit-name" style="font-size:12.5px">${item.n}</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
      <div class="edit-lbl">Pzas</div>
      <div class="stepper">
        <button class="stepper-btn" onclick="changeQty('${s.id}',${i},-1)">−</button>
        <div class="stepper-val" id="qval_${s.id}_${i}">${item.q}</div>
        <button class="stepper-btn" onclick="changeQty('${s.id}',${i},+1)">+</button>
      </div>
    </div>
    ${hasPrices ? `
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
      <div class="edit-lbl">Precio</div>
      <div class="price-field">
        <span>$</span>
        <input class="price-input" type="number" inputmode="numeric" min="0"
          value="${item.p || 0}"
          onchange="changePrice('${s.id}',${i},this.value)"
          oninput="changePrice('${s.id}',${i},this.value)">
      </div>
    </div>` : ''}
  </div>`;
}

function renderCard(si) {
  const s  = STORES[si];
  const st = storeStats(si);
  const sub = subtotal(si);
  const c  = s.c;
  return `<div class="store-card">
    <div class="store-head sh-${c}">
      <div style="flex:1;min-width:0">
        <div class="store-title">${s.emoji} ${s.name}</div>
        <div class="store-subtitle st-${c}" id="store-subtitle_${s.id}">
          ${st.done} de ${st.total} artículos marcados${sub !== null ? ' · $' + sub.toLocaleString('es-MX') : ''}
        </div>
      </div>
      ${!editMode ? `<button class="reset-btn rb-${c}" onclick="resetStore('${s.id}')">↺ Reset</button>` : ''}
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill pf-${c}" style="width:${st.pct}%"></div></div>
      <div class="prog-pct">${st.pct}%</div>
    </div>
    <div>
      ${s.items.map((item, i) => editMode ? renderItemEdit(s, item, i) : renderItemNormal(s, item, i)).join('')}
    </div>
    ${sub !== null ? `
    <div class="subtotal-row">

/* Guardar credenciales (paso 0) */
function saveOAuthConfig() {
  const cid = document.getElementById('oa-clientid').value.trim();
  const sec = document.getElementById('oa-secret').value.trim();
  const gas = document.getElementById('oa-gas').value.trim();
  if (!cid || !sec || !gas) { showToast('⚠️ Completa los 3 campos'); return; }
  OAUTH_CFG = { clientId:cid, clientSecret:sec, gasUrl:gas };
  state.oauthClientId     = cid;
  state.oauthClientSecret = sec;
  state.oauthGasUrl       = gas;
  save();
  renderOAuthSheet();
}

/* Iniciar flujo OAuth — abre popup de Google */
function startOAuthFlow() {
  const params = new URLSearchParams({
    client_id:     OAUTH_CFG.clientId,
    redirect_uri:  location.origin + location.pathname,
    response_type: 'code',
    scope:         OAUTH_SCOPES,
    access_type:   'offline',
    prompt:        'consent'   // fuerza refresh_token siempre
  });
  // Guardar flag para detectar el redirect al volver
  sessionStorage.setItem('oauth_pending', '1');
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

/* Maneja el código de autorización que Google envía en la URL */
async function handleOAuthCallback() {
  const params = new URLSearchParams(location.search);
  const code   = params.get('code');
  if (!code || !sessionStorage.getItem('oauth_pending')) return false;
  sessionStorage.removeItem('oauth_pending');

  // Limpiar URL sin recargar
  history.replaceState(null, '', location.pathname);

  showToast('🔄 Obteniendo tokens…');

  try {
    // Intercambiar code por access_token + refresh_token via Apps Script proxy
    const r = await fetch(OAUTH_CFG.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action:        'exchange',
        code:          code,
        client_id:     OAUTH_CFG.clientId,
        client_secret: OAUTH_CFG.clientSecret,
        redirect_uri:  location.origin + location.pathname
      })
    });
    const data = await r.json();
    if (data.access_token) {
      state.driveToken    = data.access_token;
      state.refreshToken  = data.refresh_token || state.refreshToken;
      state.tokenSavedAt  = Date.now();
      save();
      showToast('✅ Conectado con Google Drive');
      if (state.driveFileId) { startPolling(); triggerSync(); }
      render();
      return true;
    } else {
      showToast('❌ Error al obtener token: ' + (data.error || 'desconocido'));
    }
  } catch(e) {
    showToast('❌ Error de red al conectar');
  }
  return false;
}

/* Renovar access_token usando refresh_token (via Apps Script proxy) */
async function refreshAccessToken() {
  if (!state.refreshToken || !OAUTH_CFG.gasUrl) return false;
  try {
    const r = await fetch(OAUTH_CFG.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action:        'refresh',
        refresh_token: state.refreshToken,
        client_id:     OAUTH_CFG.clientId,
        client_secret: OAUTH_CFG.clientSecret
      })
    });
    const data = await r.json();
    if (data.access_token) {
      state.driveToken   = data.access_token;
      state.tokenSavedAt = Date.now();
      save();
      updateSyncUI();
      return true;
    }
  } catch(e) {}
  return false;
}

/* Auto-refresh: renovar 5 min antes de que expire (cada 50 min) */
async function autoRefreshIfNeeded() {
  if (!state.refreshToken || !state.tokenSavedAt) return;
  const age = Date.now() - state.tokenSavedAt;
  if (age > 50 * 60 * 1000) {   // más de 50 min → renovar
    const ok = await refreshAccessToken();
    if (ok) console.log('[OAuth] Token renovado automáticamente');
    else     syncStatus = 'error';
    updateSyncUI();
  }
}

function revokeAuth() {
  if (!confirm('¿Desconectar la cuenta de Google? Se borrará el token guardado.')) return;
  state.driveToken   = '';
  state.refreshToken = '';
  state.tokenSavedAt = null;
  save(); closeOAuthSheet(); render();
  syncStatus = 'offline'; updateSyncUI();
}

/* Mantener compatibilidad con botón "applyOAuthToken" legado */
function applyOAuthToken() {
  const inp = document.getElementById('oauth-token-input');
  if (!inp) return;
  const token = inp.value.trim();
  if (!token) return;
  state.driveToken   = token;
  state.tokenSavedAt = Date.now();
  save(); closeOAuthSheet(); render();
  if (state.driveFileId) { startPolling(); triggerSync(); }
}

/* Watcher de expiración — ahora intenta auto-renovar en lugar de solo avisar */
async function checkTokenExpiry() {
  if (!state.driveToken || !state.tokenSavedAt) return;
  const age = Date.now() - state.tokenSavedAt;
  if (age > 50 * 60 * 1000) {
    if (state.refreshToken && OAUTH_CFG.gasUrl) {
      // Tenemos refresh token → renovar silenciosamente
      await autoRefreshIfNeeded();
    } else {
      // Sin refresh token → avisar al usuario
      syncStatus = 'error';
      const lbl = document.getElementById('sync-label');
      if (lbl) lbl.textContent = '⚠️ Token expirado — toca aquí para renovar';
      updateSyncUI();
    }
  }
}

/* Guarda todos los campos del panel unificado */
function saveAllDriveConfig(thenAuthorize = false) {
  const cid  = (document.getElementById('fi-clientid')?.value || '').trim();
  const sec  = (document.getElementById('fi-secret')?.value   || '').trim();
  const gas  = (document.getElementById('fi-gas')?.value      || '').trim();
  const fid  = (document.getElementById('fi-fileid')?.value   || '').trim();

  // Guardar credenciales OAuth si las proporcionaron
  if (cid)  { state.oauthClientId     = cid; OAUTH_CFG.clientId     = cid; }
  if (sec)  { state.oauthClientSecret = sec; OAUTH_CFG.clientSecret = sec; }
  if (gas)  { state.oauthGasUrl       = gas; OAUTH_CFG.gasUrl       = gas; }
  if (fid)  { state.driveFileId       = fid; }

  save();
  showToast('✅ Configuración guardada');

  if (thenAuthorize) {
    // Cerrar panel y lanzar flujo OAuth
    showDrive = false;
    render();
    setTimeout(() => startOAuthFlow(), 300);
    return;
  }

  // Si ya tiene refresh token, reconectar
  if (state.refreshToken && state.driveToken && state.driveFileId) {
    startPolling();
    triggerSync();
  }
  render();
}

/* ═══════════════════════════════════════

function scheduleDriveWrite() {
  if (!state.driveToken || !state.driveFileId) return;
  clearTimeout(driveWriteTimer);
  driveWriteTimer = setTimeout(writeToDrive, 1500);

async function writeToDrive() {
  if (!state.driveToken || !state.driveFileId) return;
  syncStatus = 'syncing'; updateSyncUI();
  const body = JSON.stringify({ checks:state.checks, overrides:state.overrides, customItems:state.customItems, version:Date.now() });
  try {
    const r = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${state.driveFileId}?uploadType=media`,
      { method:'PATCH', headers:{'Authorization':'Bearer '+state.driveToken,'Content-Type':'application/json'}, body }
    );
    if (r.ok) { state.lastSync = Date.now(); syncStatus = 'ok'; save(); }
    else if (r.status === 401) { syncStatus = 'error'; showToast('⚠️ Token expirado — toca la barra de sync'); }
    else syncStatus = 'error';
  } catch(e) { syncStatus = 'error'; }
  updateSyncUI();
}
async function readFromDrive() {
  if (!state.driveToken || !state.driveFileId) { syncStatus='offline'; updateSyncUI(); return; }
  // Auto-renovar token si tiene más de 50 minutos
  await autoRefreshIfNeeded();
  try {
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files/${state.driveFileId}?alt=media&t=${Date.now()}`,
      { headers:{ 'Authorization':'Bearer '+state.driveToken, 'Cache-Control':'no-cache, no-store', 'Pragma':'no-cache' } }
    );
    if (r.ok) {
      const data = await r.json();
      const driveVersion = data.version || 0;
      const localVersion = state.lastSync  || 0;
      if (driveVersion > localVersion) {
        if (data.checks)      state.checks      = data.checks;
        if (data.overrides)   state.overrides   = data.overrides;
        if (data.customItems) state.customItems = data.customItems;
        state.lastSync = driveVersion;
        buildStores(); save(); render();
        showToast('🔄 Lista actualizada desde el otro dispositivo');
      }
      syncStatus = 'ok';
    } else if (r.status === 401) {
      syncStatus = 'error';
    } else {
      syncStatus = 'error';
    }
  } catch(e) { syncStatus = 'error'; }
  updateSyncUI();
}
function triggerSync() { readFromDrive(); }
function manualSync() {
  const btn = document.getElementById('sync-btn');
  if (btn) { btn.textContent='…'; setTimeout(()=>btn.textContent='↻ Sync', 2000); }
  if (!state.driveToken || !state.driveFileId) { showDiag(); return; }
  readFromDrive();
}
function startPolling() {
  if (syncTimer) clearInterval(syncTimer);
  if (!state.driveToken || !state.driveFileId) return;
  syncTimer = setInterval(readFromDrive, 10000);
}

/* ── Sync UI ── */
function updateSyncUI() {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot';
  if (!state.driveToken || !state.driveFileId) {
    lbl.textContent = '⚙️ Toca aquí para configurar Drive'; return;
  }
  if (syncStatus === 'ok') {
    dot.classList.add('ok');
    if (state.lastSync) {
      const ago = Math.round((Date.now() - state.lastSync) / 1000);
      lbl.textContent = ago < 60 ? `Sync hace ${ago}s — próximo en ~10s` : `Sync hace ${Math.round(ago/60)}min`;
    } else { lbl.textContent = 'Conectado — esperando cambios'; }
  } else if (syncStatus === 'syncing') {
    dot.classList.add('syncing'); lbl.textContent = 'Sincronizando con Drive…';
  } else if (syncStatus === 'error') {
    dot.classList.add('error'); lbl.textContent = '⚠️ Error — toca aquí para diagnosticar';
  } else {
    lbl.textContent = '⚙️ Toca aquí para configurar Drive';
  }
}
setInterval(() => { if (syncStatus === 'ok') updateSyncUI(); }, 5000);
function syncBarTap() {
  if (!state.driveToken || !state.driveFileId || syncStatus === 'error') showDiag();
  else manualSync();
}

/* ═══════════════════════════════════════
   DIAGNÓSTICO
═══════════════════════════════════════ */
function showDiag() {
  const sheet = document.getElementById('diag-sheet');
  if (!sheet) return;
  const hasToken  = !!state.driveToken;
  const hasFileId = !!state.driveFileId;
  const tokenAge  = state.tokenSavedAt ? Math.round((Date.now()-state.tokenSavedAt)/60000) : null;
  const tokenOk   = hasToken && (tokenAge===null || tokenAge < 58);
  let rows = '';
  if (!hasToken) {
    rows += diagRow('fail','🔑','Sin Access Token','El token de Google Drive no está configurado. Abre ⚙️ → "Obtener token con Google".');
  } else if (!tokenOk) {
    rows += diagRow('warn','⏰',`Token con ${tokenAge} min — posiblemente expirado`,'Los tokens duran ~60 min. Renuévalo en ⚙️ → "Renovar Access Token".');
  } else {
    rows += diagRow('ok','✅',`Token activo (${tokenAge ?? '?'} min)`,`Guardado hace ${tokenAge ?? '?'} minutos, aún válido.`);
  }
  if (!hasFileId) {
    rows += diagRow('fail','📄','Sin File ID','Falta el ID del archivo super_estado.json. Ábrelo en Drive, copia el ID de la URL y pégalo en ⚙️.');
  } else {
    rows += diagRow('ok','✅','File ID configurado',`${state.driveFileId.slice(0,14)}…${state.driveFileId.slice(-6)}`);
  }
  if (syncStatus === 'error') {
    rows += diagRow('fail','🔴','Última sync fallida','Posible token expirado o File ID incorrecto. Verifica ambos en ⚙️ y prueba "Sync ahora".');
  } else if (syncStatus === 'ok' && state.lastSync) {
    const ago = Math.round((Date.now()-state.lastSync)/1000);
    rows += diagRow('ok','🟢','Sincronización activa',`Última lectura hace ${ago}s. Polling automático cada 10 seg.`);
  } else if (!hasToken || !hasFileId) {
    rows += diagRow('fail','⏸️','Sincronización detenida','Completa token y File ID para activar la sync.');
  }
  const lsRaw = localStorage.getItem('superLista_v4');
  if (!lsRaw) {
    rows += diagRow('warn','💾','localStorage vacío','Guarda la configuración en ⚙️ para inicializar.');
  } else {
    const parsed = JSON.parse(lsRaw);
    const hasId = !!parsed.driveFileId;
    rows += diagRow(hasId?'ok':'fail','💾',
      hasId?'LocalStorage OK — File ID guardado':'LocalStorage sin File ID guardado',
      hasId?`${(lsRaw.length/1024).toFixed(1)} KB. Token y File ID persistidos.`:'El File ID no se guardó en localStorage. Abre ⚙️, pega el File ID y toca "Guardar".'
    );
  }
  const canSync = hasToken && hasFileId;
  sheet.innerHTML = `
    <div class="diag-title">🔍 Diagnóstico de sincronización</div>
    ${rows}
    ${canSync?`<button class="diag-sync-now" onclick="closeDiag();readFromDrive()">↻ Sincronizar ahora</button>`:''}
    <button class="diag-fix-btn teal" onclick="closeDiag();toggleDrivePanel()" style="margin-bottom:8px">⚙️ Abrir configuración de Drive</button>
    <button class="diag-close" onclick="closeDiag()">Cerrar</button>
  `;
  document.getElementById('diag-overlay').style.display = 'flex';
}
function diagRow(type, icon, title, desc) {
  return `<div class="diag-row ${type}"><span class="diag-icon">${icon}</span><div class="diag-text"><b>${title}</b><span>${desc}</span></div></div>`;
}
function closeDiag() { document.getElementById('diag-overlay').style.display='none'; }

/* ═══════════════════════════════════════
   ADD ITEM FLOW
═══════════════════════════════════════ */
let addTargetStore = null;  // índice de tienda seleccionada

function openAddSheet() {
  // Construir opciones de tienda dinámicamente
  const list = document.getElementById('store-options-list');
  list.innerHTML = STORES.map((s, i) => `
    <div class="store-opt so-${s.c}" onclick="selectAddStore(${i})">
      <span class="store-opt-emoji">${s.emoji}</span>
      <div class="store-opt-info">
        <div class="store-opt-name">${s.name}</div>
        <div class="store-opt-count">${s.items.length} artículos actualmente</div>
      </div>
      <span class="store-opt-arrow">›</span>
    </div>`).join('');
  document.getElementById('add-overlay-store').style.display = 'flex';
}

function selectAddStore(si) {
  addTargetStore = si;
  document.getElementById('add-overlay-store').style.display = 'none';
  openAddForm(si);
}

function openAddForm(si) {
  const s = STORES[si];
  const hasPrices = s.prices;
  document.getElementById('add-form-content').innerHTML = `
    <button class="add-form-back" onclick="backToStorePicker()">‹ Cambiar tienda</button>
    <div class="form-store-badge fsb-${s.c}">${s.emoji} ${s.name}</div>
    <div class="sheet-title">Nuevo artículo</div>
    <div class="sheet-sub" style="margin-bottom:16px">El artículo se agregará al final de la lista de ${s.name}</div>

    <div class="form-row">
      <div class="form-label">Nombre del artículo</div>
      <input class="form-input" id="new-item-name" type="text"
        placeholder="Ej. Leche deslactosada, Jabón líquido…"
        autocomplete="off" maxlength="60"
        onkeydown="if(event.key==='Enter') focusNext('new-item-qty')">
    </div>

    <div class="form-row-2col">
      <div>
        <div class="form-label">Piezas</div>
        <input class="form-input" id="new-item-qty" type="number"
          inputmode="numeric" min="1" max="99" value="1" placeholder="1"
          onkeydown="if(event.key==='Enter') focusNext('new-item-price')">
      </div>
      ${hasPrices ? `<div>
        <div class="form-label">Precio c/u ($)</div>
        <input class="form-input" id="new-item-price" type="number"
          inputmode="numeric" min="0" value="" placeholder="0"
          onkeydown="if(event.key==='Enter') confirmAddItem()">
      </div>` : `<div>
        <div class="form-label">Precio c/u ($)</div>
        <input class="form-input" id="new-item-price" type="number"
          inputmode="numeric" disabled value="" placeholder="Sin precio"
          style="opacity:.45;cursor:not-allowed">
      </div>`}
    </div>

    <button class="add-confirm-btn acb-${s.c}" onclick="confirmAddItem()">
      ＋ Agregar a ${s.name}
    </button>
    <button class="add-cancel-btn" onclick="closeAddSheet()">Cancelar</button>
  `;
  document.getElementById('add-overlay-form').style.display = 'flex';
  setTimeout(() => {
    const inp = document.getElementById('new-item-name');
    if (inp) inp.focus();
  }, 200);
}

function backToStorePicker() {
  document.getElementById('add-overlay-form').style.display = 'none';
  document.getElementById('add-overlay-store').style.display = 'flex';
}

function focusNext(id) {
  const el = document.getElementById(id);
  if (el) el.focus();
}

function confirmAddItem() {
  const nameEl  = document.getElementById('new-item-name');
  const qtyEl   = document.getElementById('new-item-qty');
  const priceEl = document.getElementById('new-item-price');

  const name  = nameEl ? nameEl.value.trim() : '';
  const qty   = Math.max(1, parseInt(qtyEl ? qtyEl.value : '1', 10) || 1);
  const price = priceEl && !priceEl.disabled ? (parseInt(priceEl.value, 10) || 0) : null;

  // Validar nombre
  if (!name) {
    nameEl.style.borderColor = 'var(--coral-mid)';
    nameEl.placeholder = '⚠️ Escribe el nombre del artículo';
    nameEl.focus();
    setTimeout(() => {
      nameEl.style.borderColor = '';
      nameEl.placeholder = 'Ej. Leche deslactosada, Jabón líquido…';
    }, 2000);
    return;
  }

  const si   = addTargetStore;
  const s    = STORES[si];
  const base = BASE_STORES[si];

  // Agregar al array base
  const newItem = { n: name, q: qty };
  if (price !== null) newItem.p = price;
  base.items.push(newItem);

  // Reconstruir stores con overrides
  buildStores();

  // Guardar en state (persiste en localStorage y Drive)
  if (!state.customItems) state.customItems = {};
  if (!state.customItems[s.id]) state.customItems[s.id] = [];
  state.customItems[s.id].push(newItem);
  save();
  scheduleDriveWrite();

  closeAddSheet();
  showToast(`✓ "${name}" agregado a ${s.name}`);

  // Si la tab activa no es esta tienda, cambiar a ella para mostrar el artículo
  if (activeTab !== si) {
    setTab(si);
  } else {
    render();
  }
}

function closeAddSheet() {
  document.getElementById('add-overlay-store').style.display = 'none';
  document.getElementById('add-overlay-form').style.display = 'none';
  addTargetStore = null;
}

function addOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeAddSheet();
}

/* Toast notification */
function showToast(msg) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2200);
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */

// Migración: si hay datos en versiones anteriores, importarlos
(function migrateOldState() {
  if (localStorage.getItem('superLista_v4')) return; // ya está en v4, nada que migrar
  const oldKeys = ['superLista_v3', 'superLista_v2', 'superLista_state_v2'];
  for (const key of oldKeys) {
    const raw = localStorage.getItem(key);
    if (raw) {
      try {
        const old = JSON.parse(raw);
        // Copiar sólo los campos relevantes
        if (old.driveToken)  state.driveToken  = old.driveToken;
        if (old.driveFileId) state.driveFileId = old.driveFileId;
        if (old.checks)      state.checks      = old.checks;
        if (old.overrides)   state.overrides   = old.overrides;
        if (old.customItems) state.customItems = old.customItems;
        if (old.lastSync)    state.lastSync    = old.lastSync;
        console.log(`[Migración] Importado desde ${key}`);
        break;
      } catch(e) {}
    }
  }
})();

load();

// Soporte para shortcuts de manifest.json (?tab=N)
const urlParams = new URLSearchParams(location.search);
if (urlParams.has('tab')) {
  const t = parseInt(urlParams.get('tab'), 10);
  if (!isNaN(t) && t >= 0 && t <= 3) activeTab = t;
}

render();

// Sincronizar tab activa visualmente
document.querySelectorAll('.tab').forEach((btn, i) => {
  const map = [-1, 0, 1, 2, 3];
  btn.classList.toggle('active', map[i] === activeTab);
});

// Mostrar estado de sync correcto desde el primer segundo
updateSyncUI();

// Manejar callback de OAuth (cuando Google redirige de vuelta con ?code=)
handleOAuthCallback().then(handled => {
  if (!handled) {
    if (state.driveToken && state.driveFileId) {
      startPolling();
      setTimeout(triggerSync, 800);
    } else {
      syncStatus = 'offline';
      updateSyncUI();
    }
  }
});

// Sincronizar inmediatamente cuando el usuario regresa a la app
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.driveToken && state.driveFileId) {
    readFromDrive();
  }
});

window.addEventListener('focus', () => {
  if (state.driveToken && state.driveFileId) readFromDrive();
});

// Verificar expiración del token cada 2 minutos
setInterval(checkTokenExpiry, 2 * 60 * 1000);

// Registrar Service Worker (modo offline)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[SW] Registrado:', reg.scope);
        navigator.serviceWorker.addEventListener('message', e => {
          if (e.data && e.data.type === 'TRIGGER_SYNC') triggerSync();
        });
      })
      .catch(err => console.warn('[SW] Error al registrar:', err));
  });
}
</script>
